// 🔹 función para mezclar (shuffle)
function mezclar(array) {
  return array.sort(() => Math.random() - 0.5);
}

// 🔹 render preguntas
const form = document.getElementById("quizForm");

preguntas.forEach((p, i) => {
  const div = document.createElement("div");
  div.className = "question";
  div.id = "q" + i;

  // mezclar opciones
  const opcionesMezcladas = mezclar([...p.opciones]);

  let html = `<p>${p.texto}</p>`;

  opcionesMezcladas.forEach((op, j) => {
    html += `
      <label>
        <input type="radio" name="q${i}" value="${op.correcta}">
        ${op.texto}
      </label><br>
    `;
  });

  div.innerHTML = html;
  form.appendChild(div);
});

// 🔹 evaluar
function evaluar() {
  let correctas = 0;

  preguntas.forEach((p, i) => {
    const seleccion = document.querySelector(`input[name="q${i}"]:checked`);
    const div = document.getElementById("q" + i);

    div.classList.remove("correct", "incorrect");

    if (seleccion) {
      if (seleccion.value === "true") {
        div.classList.add("correct");
        correctas++;
      } else {
        div.classList.add("incorrect");
      }
    } else {
      div.classList.add("incorrect");
    }
  });

  document.getElementById("resultado").innerText =
    `Resultado: ${correctas} / ${preguntas.length}`;
}
