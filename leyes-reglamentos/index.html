<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Quiz — Leyes y Reglamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0D0F14; --surface:#161A23; --surface2:#1E2330;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
    --accent:#22C47A; --accent2:#1BA369;
    --text:#F0F2F8; --muted:#7A8099;
    --green:#22C47A; --green-bg:rgba(34,196,122,0.12);
    --red:#FF5A5A; --red-bg:rgba(255,90,90,0.12);
    --blue:#4F8EF7; --blue-bg:rgba(79,142,247,0.12);
    --amber:#F5A623; --amber-bg:rgba(245,166,35,0.12);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(34,196,122,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,196,122,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
  .glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(34,196,122,0.06) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0}
  .container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

  /* INTRO */
  #screen-intro{animation:fadeUp .5s ease both}
  .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:2rem}
  .breadcrumb-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .15s}
  .breadcrumb-link:hover{color:var(--text)}
  .breadcrumb-separator{color:var(--border);margin:0 4px}
  .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
  .logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-badge svg{width:20px;height:20px}
  .logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .hero-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(34,196,122,.3);padding:4px 12px;border-radius:20px;margin-bottom:1.5rem}
  .hero-title{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,52px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem}
  .hero-title em{font-style:normal;color:var(--accent)}
  .hero-desc{font-size:16px;color:var(--muted);line-height:1.7;max-width:540px;margin-bottom:2.5rem}
  .stats-row{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2.5rem}
  .stat{flex:1;background:var(--surface);padding:1rem 1.25rem;text-align:center}
  .stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);display:block}
  .stat-lbl{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;display:block}
  .topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:2.5rem}
  .topic-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .topic-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .source-box{background:rgba(34,196,122,.08);border:1px solid rgba(34,196,122,.2);border-radius:10px;padding:14px 16px;font-size:13px;color:#7FDC9F;margin-bottom:2.5rem;line-height:1.6}
  .source-box strong{color:#A5E8B5;font-weight:500;display:block;margin-bottom:4px}
  .btn-start{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#0D0F14;border:none;border-radius:10px;padding:14px 28px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:transform .15s,background .15s}
  .btn-start:hover{background:var(--accent2);transform:translateY(-2px)}
  .btn-start svg{width:18px;height:18px}

  /* QUIZ - LIST VIEW */
  #screen-quiz{display:none;animation:fadeUp .3s ease both}
  .quiz-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
  .progress-wrap{margin-bottom:1rem}
  .progress-info{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--muted)}
  .progress-info strong{color:var(--accent)}
  .progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
  .questions-container{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;margin-bottom:2rem}
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;animation:fadeUp .3s ease}
  .question-card.answered{border-color:var(--accent)}
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .q-num-badge{font-family:Syne;font-size:12px;color:var(--muted)}
  .section-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(34,196,122,.1);border:1px solid rgba(34,196,122,.2);padding:3px 10px;border-radius:20px}
  .q-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:1.5rem;line-height:1.4}
  .options{display:flex;flex-direction:column;gap:12px}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
  .opt:hover{border-color:var(--border2);background:rgba(34,196,122,.05)}
  .opt.selected{border-color:var(--accent);background:rgba(34,196,122,.08)}
  .opt-radio{width:18px;height:18px;min-width:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:2px}
  .opt.selected .opt-radio{border-color:var(--accent);background:var(--accent)}
  .opt.selected .opt-radio::after{content:'';width:6px;height:6px;background:#0D0F14;border-radius:50%}
  .opt-text{font-size:14px;line-height:1.5;color:var(--text)}
  .quiz-footer{max-width:760px;margin:2rem auto;text-align:right}
  .btn-nav{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .2s}
  .btn-nav:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
  .btn-nav.primary{background:var(--accent);color:#0D0F14;border-color:var(--accent)}
  .btn-nav.primary:hover{background:var(--accent2)}
  .btn-nav.primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-nav svg{width:16px;height:16px}

  /* RESULT */
  #screen-result{display:none;animation:fadeUp .5s ease both}
  .result-hero{text-align:center;padding:3rem 0;margin-bottom:2rem}
  .score-ring{position:relative;width:180px;height:180px;margin:0 auto 2rem}
  .score-ring svg{width:180px;height:180px;transform:rotate(-90deg)}
  .score-ring .track{fill:none;stroke:var(--surface2);stroke-width:10}
  .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
  .score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-num{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;line-height:1}
  .score-denom{font-size:13px;color:var(--muted);margin-top:4px}
  .result-label{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:8px}
  .result-pct{font-size:16px;color:var(--muted);margin-bottom:2rem}
  .result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .rs{background:var(--surface);padding:1.5rem;text-align:center}
  .rs-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;display:block;margin-bottom:0.5rem}
  .rs-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .result-quiz-layout{display:grid;grid-template-columns:280px 1fr;gap:2rem}
  .review-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;height:fit-content;position:sticky;top:2rem;max-height:calc(100vh - 4rem);overflow-y:auto}
  .review-list{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .review-number{width:100%;aspect-ratio:1;background:var(--surface2);border:2px solid transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
  .review-number.correct{background:rgba(34,196,122,.15);border-color:var(--green);color:var(--green)}
  .review-number.incorrect{background:rgba(255,90,90,.15);border-color:var(--red);color:var(--red)}
  .review-number:hover{transform:scale(1.05)}
  .review-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem}
  .review-item{margin-bottom:2rem}
  .review-header{margin-bottom:1.5rem}
  .review-q{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:1rem}
  .review-answers{font-size:13px;line-height:1.8}
  .ans-label{color:var(--muted);display:block;margin-bottom:0.3rem}
  .ans-correct{color:var(--green);font-weight:600}
  .ans-wrong{color:var(--red);font-weight:600}
  .ans-exp{color:var(--muted);margin-top:0.8rem;font-size:12px;line-height:1.6;padding:0.8rem;background:rgba(34,196,122,.05);border-left:2px solid var(--accent);border-radius:4px}
  .ref-pill{display:inline-flex;align-items:center;gap:6px;margin-top:1rem;background:rgba(34,196,122,.08);border:1px solid rgba(34,196,122,.2);border-radius:6px;padding:6px 12px;font-size:11px;color:#7FDC9F}
  .ref-pill svg{width:12px;height:12px}
  .result-actions{display:flex;gap:12px;justify-content:center;margin-top:3rem}
  .breadcrumb-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;margin-bottom:2rem;transition:color .2s}
  .breadcrumb-back:hover{color:var(--text)}
  .breadcrumb-back svg{width:14px;height:14px}

  /* --- FEEDBACK INMEDIATO --- */
  .opt.correct{border-color:var(--green);background:var(--green-bg);cursor:default}
  .opt.correct .opt-radio{border-color:var(--green);background:var(--green)}
  .opt.correct .opt-radio::after{content:'✓';color:#0D0F14;font-size:10px;font-weight:700;width:auto;height:auto;background:none;border-radius:0}
  .opt.incorrect{border-color:var(--red);background:var(--red-bg);cursor:default}
  .opt.incorrect .opt-radio{border-color:var(--red)}
  .opt.disabled{cursor:default;pointer-events:none}
  .q-feedback{display:none;font-size:13px;color:var(--muted);line-height:1.6;margin-top:1rem;padding:.75rem 1rem;background:rgba(255,255,255,.03);border-left:2px solid var(--accent);border-radius:4px}
  .question-card.answered .q-feedback{display:block}
  .btn-study{display:inline-flex;align-items:center;gap:10px;background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:14px 28px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .15s}
  .btn-study svg{width:18px;height:18px}
  .btn-study:hover{border-color:var(--green);color:var(--green);background:var(--green-bg);transform:translateY(-2px)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap}
  #screen-quiz.study-mode .quiz-header,
  #screen-quiz.study-mode .quiz-footer{display:none}
  .study-banner{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--green);background:var(--green-bg);border:1px solid rgba(34,196,122,.2);border-radius:20px;padding:5px 14px;margin-bottom:1.5rem}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:1024px){
    .result-quiz-layout{grid-template-columns:1fr;gap:1.5rem}
    .review-sidebar{position:static;max-height:none;margin-bottom:1.5rem}
  }
  @media(max-width:600px){
    .container{padding:1.5rem 1rem 3rem}
    .review-list{grid-template-columns:repeat(3,1fr)}
    .question-card{padding:1.5rem}
    .quiz-footer{text-align:center}
    .btn-nav{width:100%;justify-content:center}
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div id="screen-intro"></div>
  <div id="screen-quiz">
    <a class="breadcrumb-back" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al portal
    </a>
    <div class="quiz-header">
      <div class="progress-wrap">
        <div class="progress-info"><span>Respondidas</span><strong id="prog-count">0 / 0</strong></div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="questions-container" id="questions-container"></div>
    <div class="quiz-footer">
      <button class="btn-nav primary" id="btn-evaluate" onclick="evaluateQuiz()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Evaluar
      </button>
    </div>
  </div>
  <div id="screen-result"></div>
</div>

<script>
const QUIZ_CONFIG = {
meta: {
  pageTitle:   "Quiz — Leyes y Reglamentos",
  logoLabel:   "Leyes y Reglamentos",
  heroTag:     "Tercer Crédito · 30 preguntas",
  heroTitle:   ["Leyes y", "<em>Reglamentos</em>", "de Tránsito"],
  description: "Evalúa tu conocimiento sobre el marco legal del transporte: títulos habilitantes, tipos de licencia, taxi convencional y ejecutivo, permisos de operación y normativa de la ANT.",
},
source: {
  label:    "Fuente del material",
  title:    "Cuestionario Tercer Crédito - Ley y Reglamento de Tránsito",
  subtitle: "Marco legal del transporte, licencias y permisos de operación",
  pages:    "Legislación oficial",
  note:     "Basado en el cuestionario oficial de educación vial ecuatoriana.",
},
topics: [
  "Transporte público y comercial",
  "Títulos habilitantes",
  "Clasificación de licencias",
  "Taxi convencional y ejecutivo",
  "Sanciones de operación",
  "Permisos de operación",
  "Transporte mixto",
  "ANT y organismos reguladores",
],
grading: [
  { min: 90, label: "¡Excelente!",       color: "#22C47A" },
  { min: 70, label: "Muy bien",           color: "#4F8EF7" },
  { min: 50, label: "Aprobado",           color: "#F5A623" },
  { min:  0, label: "Sigue practicando", color: "#FF5A5A" },
],
questions: [
  { section: "Transporte público", q: "¿Se considera transporte público a:", opts: ["Servicio prestado por el estado u otorgado mediante un Título Habilitante a compañías y cooperativas legalmente constituidas.", "Servicio prestado por el estado y los municipios", "Servicio prestado por todos para todos."], ans: 0, exp: "Transporte público es el servicio prestado por el estado u otorgado mediante Título Habilitante a compañías y cooperativas legalmente constituidas.", ref: { page: 1, section: "Transporte público", detail: "Definición legal" } },
  { section: "Títulos habilitantes", q: "¿Qué tiempo dura el título habilitante para conducir con licencia de conducir?", opts: ["2 Años", "3 Años", "5 Años"], ans: 2, exp: "El título habilitante (licencia de conducir) tiene vigencia de 5 años.", ref: { page: 1, section: "Títulos habilitantes", detail: "Vigencia de licencia" } },
  { section: "Clasificación de licencias", q: "Las licencias se clasifican en:", opts: ["Profesionales, no profesionales y especiales", "Preferenciales y especiales", "TIPO G y H"], ans: 0, exp: "Las licencias se clasifican en profesionales, no profesionales y especiales.", ref: { page: 1, section: "Clasificación", detail: "Tipos de licencia" } },
  { section: "Permiso de aprendizaje", q: "¿Qué requisitos debe tener el menor adulto para obtener el permiso de aprendizaje?", opts: ["Ser mayor de 16 años", "Petición al representante legal de la escuela de conducción", "Derechos correspondientes", "Todos"], ans: 3, exp: "Para el permiso de aprendizaje se requieren todos los requisitos: ser mayor de 16 años, petición legal y derechos.", ref: { page: 1, section: "Permiso de aprendizaje", detail: "Requisitos para aprender" } },
  { section: "Capacitación de conductores", q: "¿Quién o quiénes promoverán la capacitación, formación y tecnificación de conductores profesionales y no profesionales?", opts: ["Estado", "Escuelas de capacitación conductores profesionales y no profesionales", "Los municipios descentralizados"], ans: 1, exp: "Las escuelas de capacitación son las encargadas de capacitar conductores profesionales y no profesionales.", ref: { page: 1, section: "Capacitación", detail: "Formación de conductores" } },
  { section: "Cuerpos normativos", q: "¿En qué cuerpo normativo se encuentran detalladas las contravenciones de tránsito?", opts: ["Código Orgánico Integral Penal", "Ley Orgánica de Transporte Terrestre, Tránsito y Seguridad Vial", "Ordenanzas Municipales"], ans: 0, exp: "Las contravenciones de tránsito se encuentran detalladas en el Código Orgánico Integral Penal.", ref: { page: 1, section: "Cuerpos normativos", detail: "Marco legal" } },
  { section: "Transporte mixto", q: "Se considera transporte mixto a un vehículo con capacidad de carga de:", opts: ["Hasta 3.5 toneladas", "Hasta 1.2 toneladas", "Mayor a 1.2 toneladas"], ans: 1, exp: "Transporte mixto es un vehículo con capacidad de carga de hasta 1.2 toneladas.", ref: { page: 1, section: "Transporte mixto", detail: "Clasificación por carga" } },
  { section: "Licencia de conducción", q: "¿Cómo se llama la autorización administrativa previa para conducir?", opts: ["Matrícula vehicular", "Licencia de conducción", "Ninguna de las anteriores"], ans: 1, exp: "La autorización administrativa previa para conducir se llama Licencia de conducción.", ref: { page: 1, section: "Licencia de conducción", detail: "Documentación requerida" } },
  { section: "Títulos habilitantes", q: "¿Cuál es el título habilitante mediante el cual se autoriza la prestación de servicios de transporte?", opts: ["Constitución Jurídica", "Documento emitido por Operadora", "Permiso, Contrato de Operación y Autorización de Operación"], ans: 2, exp: "El título habilitante para transporte es el Permiso, Contrato de Operación y Autorización de Operación.", ref: { page: 1, section: "Títulos habilitantes", detail: "Documentación de operación" } },
  { section: "Taxi convencional", q: "¿Cuál de las siguientes definiciones corresponde a Taxi Convencional?", opts: ["Consiste en el traslado de pasajeros mediante la petición de manera directa en las vías urbanas, en puntos específicos definidos dentro del mobiliario urbano (paradero de taxi), mediante la petición a un centro de llamadas", "Consiste en el traslado de terceras personas mediante la petición del servicio, exclusivamente, a través de un centro de llamadas, siendo el recorrido autorizado el solicitado por el cliente", "Consiste en el traslado de estudiantes desde sus domicilios hasta la institución educativa y viceversa; y en las mismas condiciones al personal de una institución o empresa pública o privada"], ans: 0, exp: "Taxi convencional es el traslado de pasajeros en vías urbanas en puntos específicos (paraderos) o mediante petición a un centro de llamadas.", ref: { page: 1, section: "Taxi convencional", detail: "Clasificación de taxi" } },
  { section: "Taxi ejecutivo", q: "¿Cuál de las siguientes definiciones corresponde a Taxi Ejecutivo?", opts: ["Consiste en el traslado de terceras personas mediante la petición de manera directa en las vías periféricas", "Consiste en el traslado de terceras personas mediante la petición del servicio en vías urbanas", "Consiste en el traslado de terceras personas mediante la petición del servicio exclusivamente a través de un centro de llamadas"], ans: 2, exp: "Taxi ejecutivo es el traslado de personas exclusivamente a través de un centro de llamadas.", ref: { page: 2, section: "Taxi ejecutivo", detail: "Servicio de taxi ejecutivo" } },
  { section: "Licencia para taxi", q: "¿Cuál es el tipo de licencia que se requiere para conducir un taxi?", opts: ["Tipo D", "Tipo B", "Tipo C"], ans: 2, exp: "Para conducir un taxi se requiere la licencia Tipo C.", ref: { page: 2, section: "Licencia para taxi", detail: "Requisito de conducción" } },
  { section: "Servicio en taxi", q: "Seleccione la afirmación correcta:", opts: ["El transporte en taxi se realizará sólo en vehículos autorizados de hasta 5 pasajeros, incluido el conductor", "El transporte en taxi se realizará sólo en vehículos de 5 pasajeros mínimo, incluido el conductor", "El transporte en taxi se realizará en vehículos de hasta 7 pasajeros, incluido el conductor"], ans: 0, exp: "El transporte en taxi se realiza en vehículos autorizados de hasta 5 pasajeros, incluido el conductor.", ref: { page: 2, section: "Servicio en taxi", detail: "Capacidad del vehículo" } },
  { section: "Vehículos autorizados", q: "¿Pueden brindar el servicio de transporte en taxi en vehículos no autorizados?", opts: ["Sí, si el vehículo autorizado se encuentre en reparación", "Sí, si la Directiva de la Operadora le autoriza mediante un documento, el cual debe portar", "No, bajo ninguna circunstancia"], ans: 2, exp: "No se puede brindar servicio de taxi en vehículos no autorizados bajo ninguna circunstancia.", ref: { page: 2, section: "Vehículos autorizados", detail: "Requisito de autorización" } },
  { section: "Permiso de aprendizaje", q: "Si usted está estudiando para obtener la licencia tipo C en una escuela autorizada, ¿puede brindar el servicio de transporte en taxi en una unidad autorizada?", opts: ["No", "No en una unidad autorizada, solo en su vehículo particular", "Sí, con una autorización provisional"], ans: 0, exp: "Un estudiante de licencia tipo C no puede brindar servicio de transporte en taxi, ni en unidades autorizadas.", ref: { page: 2, section: "Permiso de aprendizaje", detail: "Restricción para estudiantes" } },
  { section: "Propiedad de taxis", q: "¿Puede una persona natural ser propietaria de más de un vehículo de transporte en taxi?", opts: ["Sí", "No", "Sí, con una autorización de la Directiva de la Operadora"], ans: 1, exp: "Una persona natural no puede ser propietaria de más de un vehículo de transporte en taxi.", ref: { page: 2, section: "Propiedad de taxis", detail: "Limitación de propiedad" } },
  { section: "Sanciones de operación", q: "¿Qué sanción se aplica si existen denuncias comprobadas de operación indebida de un vehículo de transporte en taxi fuera del área de su jurisdicción?", opts: ["Suspensión definitiva del cupo operacional de la operadora de transporte", "Suspensión temporal del cupo operacional de la operadora de transporte", "Llamado de atención"], ans: 1, exp: "La sanción por operar fuera de jurisdicción es suspensión temporal del cupo operacional.", ref: { page: 2, section: "Sanciones de operación", detail: "Infracciones de operación" } },
  { section: "Sanciones de operación", q: "¿Qué sanción se aplica si existen denuncias comprobadas de la prestación de un servicio de transporte distinto al autorizado por parte de un vehículo de transporte en taxi?", opts: ["Suspensión definitiva del cupo operacional de la operadora de transporte", "No amerita sanción alguna", "Suspensión temporal del cupo operacional de la operadora de transporte"], ans: 2, exp: "Prestar servicio distinto al autorizado resulta en suspensión temporal del cupo operacional.", ref: { page: 3, section: "Sanciones de operación", detail: "Servicios no autorizados" } },
  { section: "Transporte público", q: "Consiste en el traslado de personas, con o sin sus efectos personales, de un lugar a otro, dentro de los ámbitos definidos por la ley y reglamentos, para lo cual el Estado podrá delegar este servicio mediante contratos de operación a compañías o cooperativas creadas para este fin:", opts: ["Transporte de personas en bus", "Transporte público.", "Transporte en taxi", "Transporte mixto de personas y carga."], ans: 1, exp: "Esta definición corresponde a Transporte público.", ref: { page: 3, section: "Transporte público", detail: "Definición oficial" } },
  { section: "Permiso de operación", q: "Es el título habilitante que concede el Estado a una persona jurídica para el transporte terrestre comercial de personas y/o bienes:", opts: ["Contrato de Operación.", "Permiso de Operación.", "Permiso de Transporte", "Permiso de Trabajo de Transporte."], ans: 1, exp: "El Permiso de Operación es el título habilitante para transporte comercial.", ref: { page: 3, section: "Permiso de operación", detail: "Títulos habilitantes" } },
  { section: "Servicio comercial taxi", q: "El servicio comercial de taxis se divide en:", opts: ["Ejecutivo y convencional.", "Particular.", "Público.", "No hay clasificación."], ans: 0, exp: "El servicio comercial de taxis se divide en Ejecutivo y Convencional.", ref: { page: 3, section: "Servicio comercial taxi", detail: "Clasificación de servicios" } },
  { section: "Transporte público", q: "Subdivisión del servicio de Transporte Público:", opts: ["Interprovincial, Intercantonal, Interparroquial.", "Intracantonal, intraprovincial, interprovincial e internacional.", "Interprovincial, Urbano, Parroquial.", "Parroquial, Rural y Urbano."], ans: 1, exp: "Las subdivisiones del transporte público son: Intracantonal, intraprovincial, interprovincial e internacional.", ref: { page: 3, section: "Transporte público", detail: "Clasificación por área" } },
  { section: "Licencia Tipo F", q: "La licencia Tipo F, es para conductores:", opts: ["Profesionales.", "No Profesionales", "No profesionales con automotores especiales y adaptados de acuerdo a su discapacidad.", "Para personas discapacitadas."], ans: 2, exp: "La licencia Tipo F es para conductores no profesionales con automotores especiales adaptados a su discapacidad.", ref: { page: 3, section: "Licencia Tipo F", detail: "Licencias especiales" } },
  { section: "ANT y organismos", q: "¿Es el responsable de otorgar permisos provisionales de aprendizaje de manejo, de conducción para menor adulto, de conducción vehicular, de circulación vehicular e internacional de conducir?", opts: ["Director Ejecutivo de la ANT y las Unidades Administrativas.", "La Policía Nacional", "El juez de tránsito y de la Niñez y Adolescencia."], ans: 0, exp: "El Director Ejecutivo de la ANT y sus Unidades Administrativas otorgan los permisos de conducción.", ref: { page: 3, section: "ANT", detail: "Autoridad competente" } },
  { section: "Puntos de licencia", q: "De acuerdo a la Ley de Tránsito, ¿cuántos puntos tiene una licencia?", opts: ["10 puntos.", "25 puntos.", "50 puntos", "30 puntos."], ans: 3, exp: "Una licencia de conducir tiene 30 puntos según la Ley de Tránsito.", ref: { page: 3, section: "Puntos de licencia", detail: "Sistema de puntos" } },
  { section: "Emisión de licencias", q: "Son los encargados de emitir las licencias profesionales y no profesionales de conducir:", opts: ["La Policía Nacional, sus jefaturas y subjefaturas.", "La Agencia Nacional de Tránsito y sus Unidades Administrativas.", "Los GADs.", "Directorio de la ANT."], ans: 1, exp: "La Agencia Nacional de Tránsito y sus Unidades Administrativas emiten las licencias de conducir.", ref: { page: 4, section: "Emisión de licencias", detail: "Autoridad emisora" } },
  { section: "Matrícula vehicular", q: "¿Cuántos años tiene de vigencia la especie de la matrícula vehicular?", opts: ["1 año.", "5 años.", "No caduca."], ans: 1, exp: "La matrícula vehicular tiene vigencia de 5 años.", ref: { page: 4, section: "Matrícula vehicular", detail: "Vigencia de documentos" } },
  { section: "Transporte mixto", q: "¿Cuántas personas pueden ser trasladadas en un vehículo de transporte mixto?", opts: ["Hasta 5 personas incluyendo el conductor.", "Hasta 5 personas sin incluir el conductor.", "Ninguna de las anteriores."], ans: 0, exp: "En un vehículo de transporte mixto pueden trasladarse hasta 5 personas incluyendo el conductor.", ref: { page: 4, section: "Transporte mixto", detail: "Capacidad de pasajeros" } },
  { section: "Tipos de licencia", q: "¿Qué tipo de licencia se necesita para conducir vehículos de carga de 3.6 toneladas en adelante y transporte férreo?", opts: ["Tipo C.", "Tipo G.", "Tipo E."], ans: 2, exp: "Se requiere licencia Tipo E para conducir vehículos de carga de 3.6 toneladas en adelante y transporte férreo.", ref: { page: 4, section: "Tipos de licencia", detail: "Vehículos de carga" } },
  { section: "Tipos de licencia", q: "¿Qué tipo de licencia se necesita para conducir vehículos de pasajeros de más de 26 asientos?", opts: ["Tipo C.", "Tipo D.", "Tipo E."], ans: 1, exp: "Se requiere licencia Tipo D para conducir vehículos de pasajeros de más de 26 asientos.", ref: { page: 4, section: "Tipos de licencia", detail: "Transporte de pasajeros" } },
]
};

let currentIndex = 0;
let answers = {};
let quizMode = null;

function initQuiz() {
  document.title = QUIZ_CONFIG.meta.pageTitle;
  renderIntro();
}

function renderIntro() {
  const intro = document.getElementById('screen-intro');
  const { meta, source, topics, questions } = QUIZ_CONFIG;

  intro.innerHTML = `
    <div class="breadcrumb">
      <a class="breadcrumb-link" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Portal
      </a>
      <span class="breadcrumb-separator">/</span>
      <span style="font-size:12px;color:var(--text)">${meta.logoLabel}</span>
    </div>
    <div class="logo-row">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <div class="logo-text">${meta.logoLabel}</div>
    </div>
    <div class="hero-tag">${meta.heroTag}</div>
    <h1 class="hero-title">${meta.heroTitle.join(' ')}</h1>
    <p class="hero-desc">${meta.description}</p>
    <div class="stats-row">
      <div class="stat"><span class="stat-num">${questions.length}</span><span class="stat-lbl">Preguntas</span></div>
      <div class="stat"><span class="stat-num">${topics.length}</span><span class="stat-lbl">Temas</span></div>
    </div>
    <div class="topics">${topics.map(t => `<div class="topic-chip"><div class="topic-dot"></div>${t}</div>`).join('')}</div>
    <div class="source-box">
      <strong>${source.label}</strong>
      ${source.title}<br/>
      <small style="color:rgba(165,232,181,0.8)">${source.subtitle}</small>
    </div>
    <div class="btn-row">
      <button class="btn-study" onclick="startStudyMode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Estudiar
      </button>
      <button class="btn-start" onclick="startQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Realizar prueba
      </button>
    </div>
  `;
}

function startQuiz() {
  quizMode = 'test';
  document.getElementById('screen-intro').style.display = 'none';
  const quizScreen = document.getElementById('screen-quiz');
  quizScreen.classList.remove('study-mode');
  quizScreen.style.display = 'block';
  renderAllQuestions();
  updateProgress();
}

function startStudyMode() {
  quizMode = 'study';
  answers = {};
  document.getElementById('screen-intro').style.display = 'none';
  const quizScreen = document.getElementById('screen-quiz');
  quizScreen.classList.add('study-mode');
  quizScreen.style.display = 'block';
  renderStudyMode();
  window.scrollTo(0, 0);
}

function renderStudyMode() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '<div class="study-banner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Modo Estudio</div>' +
    QUIZ_CONFIG.questions.map((q, i) => {
      const correctIdx = q.ans;
      const optsHTML = q.opts.map((opt, j) => {
        let cls = 'opt disabled';
        if (j === correctIdx) cls += ' correct';
        return `<div class="${cls}"><div class="opt-radio"></div><div class="opt-text">${opt}</div></div>`;
      }).join('');
      return `
        <div class="question-card answered" id="qcard-${i}">
          <div class="q-meta">
            <span class="q-num-badge">P${i+1}</span>
            <div class="section-tag">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              ${q.section}
            </div>
          </div>
          <h2 class="q-title">${q.q}</h2>
          <div class="options">${optsHTML}</div>
          <div class="q-feedback">${q.exp}</div>
        </div>`;
    }).join('');
}

function renderAllQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = QUIZ_CONFIG.questions.map((q, i) => {
    const answered = answers[i] !== undefined;
    const userChoice = answers[i];
    const correctIdx = q.ans;
    const optsHTML = q.opts.map((opt, j) => {
      let cls = 'opt';
      if (answered) {
        cls += ' disabled';
        if (j === correctIdx) cls += ' correct';
        else if (j === userChoice) cls += ' incorrect';
      }
      return `<div class="${cls}" onclick="answerQuestion(${i}, ${j})"><div class="opt-radio"></div><div class="opt-text">${opt}</div></div>`;
    }).join('');
    return `
      <div class="question-card ${answered ? 'answered' : ''}" id="qcard-${i}">
        <div class="q-meta">
          <span class="q-num-badge">P${i+1}</span>
          <div class="section-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            ${q.section}
          </div>
        </div>
        <h2 class="q-title">${q.q}</h2>
        <div class="options">${optsHTML}</div>
        <div class="q-feedback">${q.exp}</div>
      </div>`;
  }).join('');
}

function answerQuestion(qIdx, optIdx) {
  if (answers[qIdx] !== undefined) return;
  answers[qIdx] = optIdx;
  const q = QUIZ_CONFIG.questions[qIdx];
  const correctIdx = q.ans;
  const card = document.getElementById('qcard-' + qIdx);
  card.classList.add('answered');
  card.querySelectorAll('.opt').forEach((el, j) => {
    el.classList.add('disabled');
    if (j === correctIdx) el.classList.add('correct');
    else if (j === optIdx) el.classList.add('incorrect');
  });
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = QUIZ_CONFIG.questions.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('prog-count').textContent = `${answered} / ${total}`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function updateButtons() {
  const allAnswered = Object.keys(answers).length === QUIZ_CONFIG.questions.length;
  document.getElementById('btn-evaluate').disabled = !allAnswered;
}

function evaluateQuiz() {
  if (Object.keys(answers).length < QUIZ_CONFIG.questions.length) {
    alert('Por favor responde todas las preguntas antes de evaluar');
    return;
  }
  renderResult();
}

function renderResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';

  let correctCount = 0;
  QUIZ_CONFIG.questions.forEach((q, i) => {
    if (answers[i] === q.ans) correctCount++;
  });

  const total = QUIZ_CONFIG.questions.length;
  const pct = Math.round((correctCount / total) * 100);
  const gradeObj = QUIZ_CONFIG.grading.find(g => pct >= g.min);

  const result = document.getElementById('screen-result');
  const circumference = 2 * Math.PI * 85;
  const strokeDashoffset = circumference - (pct / 100) * circumference;

  let reviewHTML = '';
  QUIZ_CONFIG.questions.forEach((q, i) => {
    const isCorrect = answers[i] === q.ans;
    const userAns = q.opts[answers[i]];
    const correctAns = q.opts[q.ans];

    reviewHTML += `
      <div class="review-item">
        <div class="review-header">
          <div class="review-q">P${i + 1}: ${q.q}</div>
        </div>
        <div class="review-answers">
          <span class="ans-label">Tu respuesta:</span>
          <div class="${isCorrect ? 'ans-correct' : 'ans-wrong'}">${userAns || '(no respondida)'}</div>
          ${!isCorrect ? `<span class="ans-label" style="margin-top:0.5rem;display:block">Respuesta correcta:</span><div class="ans-correct">${correctAns}</div>` : ''}
          <div class="ans-exp">${q.exp}</div>
          <div class="ref-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            ${q.ref.section}
          </div>
        </div>
      </div>
    `;
  });

  result.innerHTML = `
    <a class="breadcrumb-back" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al portal
    </a>
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 180 180">
          <circle class="track" cx="90" cy="90" r="85"/>
          <circle class="ring-fill" cx="90" cy="90" r="85" stroke="${gradeObj.color}" style="stroke-dasharray:${circumference};stroke-dashoffset:${strokeDashoffset}"/>
        </svg>
        <div class="score-inner">
          <div class="score-num">${correctCount}</div>
          <div class="score-denom">/ ${total}</div>
        </div>
      </div>
      <div class="result-label" style="color:${gradeObj.color}">${gradeObj.label}</div>
      <div class="result-pct">${pct}% correcto</div>
    </div>
    <div class="result-stats">
      <div class="rs">
        <span class="rs-num" style="color:var(--green)">${correctCount}</span>
        <span class="rs-lbl">Correctas</span>
      </div>
      <div class="rs">
        <span class="rs-num" style="color:var(--red)">${total - correctCount}</span>
        <span class="rs-lbl">Incorrectas</span>
      </div>
      <div class="rs">
        <span class="rs-num">${pct}%</span>
        <span class="rs-lbl">Porcentaje</span>
      </div>
    </div>
    <div class="result-quiz-layout">
      <div class="review-sidebar">
        <div class="sidebar-title">Resultados</div>
        <div class="review-list">
          ${QUIZ_CONFIG.questions.map((q, i) => {
            const isCorrect = answers[i] === q.ans;
            return `<div class="review-number ${isCorrect ? 'correct' : 'incorrect'}" onclick="scrollToReview(${i})">${i + 1}</div>`;
          }).join('')}
        </div>
      </div>
      <div class="review-content" id="review-content">
        ${reviewHTML}
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-nav" onclick="retryQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/></svg>
        Reintentar
      </button>
      <button class="btn-nav primary" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Volver al portal
      </button>
    </div>
  `;
  window.scrollTo(0, 0);
}

function scrollToReview(idx) {
  const reviewContent = document.getElementById('review-content');
  if (reviewContent) {
    reviewContent.children[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function retryQuiz() {
  answers = {};
  const quizScreen = document.getElementById('screen-quiz');
  quizScreen.classList.remove('study-mode');
  document.getElementById('screen-result').style.display = 'none';
  quizScreen.style.display = 'block';
  renderAllQuestions();
  updateProgress();
  window.scrollTo(0, 0);
}

function goHome() {
  window.location.href = '../index.html';
}

initQuiz();
</script>
</body>
</html>
