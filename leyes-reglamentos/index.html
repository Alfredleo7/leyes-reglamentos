<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Quiz — Leyes y Reglamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0D0F14; --surface:#161A23; --surface2:#1E2330;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
    --accent:#22C47A; --accent2:#1BA369;
    --text:#F0F2F8; --muted:#7A8099;
    --green:#22C47A; --green-bg:rgba(34,196,122,0.12);
    --red:#FF5A5A; --red-bg:rgba(255,90,90,0.12);
    --blue:#4F8EF7; --blue-bg:rgba(79,142,247,0.12);
    --amber:#F5A623; --amber-bg:rgba(245,166,35,0.12);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(34,196,122,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(34,196,122,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
  .glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(34,196,122,0.06) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0}
  .container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

  /* INTRO */
  #screen-intro{animation:fadeUp .5s ease both}
  .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:2rem}
  .breadcrumb-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .15s}
  .breadcrumb-link:hover{color:var(--text)}
  .breadcrumb-separator{color:var(--border);margin:0 4px}
  .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
  .logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-badge svg{width:20px;height:20px}
  .logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .hero-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(34,196,122,.3);padding:4px 12px;border-radius:20px;margin-bottom:1.5rem}
  .hero-title{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,52px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem}
  .hero-title em{font-style:normal;color:var(--accent)}
  .hero-desc{font-size:16px;color:var(--muted);line-height:1.7;max-width:540px;margin-bottom:2.5rem}
  .stats-row{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2.5rem}
  .stat{flex:1;background:var(--surface);padding:1rem 1.25rem;text-align:center}
  .stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);display:block}
  .stat-lbl{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;display:block}
  .topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:2.5rem}
  .topic-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .topic-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .source-box{background:rgba(34,196,122,.08);border:1px solid rgba(34,196,122,.2);border-radius:10px;padding:14px 16px;font-size:13px;color:#7FDC9F;margin-bottom:2.5rem;line-height:1.6}
  .source-box strong{color:#A5E8B5;font-weight:500;display:block;margin-bottom:4px}
  .btn-start{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#0D0F14;border:none;border-radius:10px;padding:14px 28px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:transform .15s,background .15s}
  .btn-start:hover{background:var(--accent2);transform:translateY(-2px)}
  .btn-start svg{width:18px;height:18px}

  /* QUIZ - LIST VIEW */
  #screen-quiz{display:none;animation:fadeUp .3s ease both}
  .quiz-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
  .progress-wrap{margin-bottom:1rem}
  .progress-info{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--muted)}
  .progress-info strong{color:var(--accent)}
  .progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
  .questions-container{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;margin-bottom:2rem}
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;animation:fadeUp .3s ease}
  .question-card.answered{border-color:var(--accent)}
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .q-num-badge{font-family:Syne;font-size:12px;color:var(--muted)}
  .section-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(34,196,122,.1);border:1px solid rgba(34,196,122,.2);padding:3px 10px;border-radius:20px}
  .q-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:1.5rem;line-height:1.4}
  .options{display:flex;flex-direction:column;gap:12px}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
  .opt:hover{border-color:var(--border2);background:rgba(34,196,122,.05)}
  .opt.selected{border-color:var(--accent);background:rgba(34,196,122,.08)}
  .opt-radio{width:18px;height:18px;min-width:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:2px}
  .opt.selected .opt-radio{border-color:var(--accent);background:var(--accent)}
  .opt.selected .opt-radio::after{content:'';width:6px;height:6px;background:#0D0F14;border-radius:50%}
  .opt-text{font-size:14px;line-height:1.5;color:var(--text)}
  .quiz-footer{max-width:760px;margin:2rem auto;text-align:right}
  .btn-nav{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .2s}
  .btn-nav:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
  .btn-nav.primary{background:var(--accent);color:#0D0F14;border-color:var(--accent)}
  .btn-nav.primary:hover{background:var(--accent2)}
  .btn-nav.primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-nav svg{width:16px;height:16px}

  /* RESULT */
  #screen-result{display:none;animation:fadeUp .5s ease both}
  .result-hero{text-align:center;padding:3rem 0;margin-bottom:2rem}
  .score-ring{position:relative;width:180px;height:180px;margin:0 auto 2rem}
  .score-ring svg{width:180px;height:180px;transform:rotate(-90deg)}
  .score-ring .track{fill:none;stroke:var(--surface2);stroke-width:10}
  .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
  .score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-num{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;line-height:1}
  .score-denom{font-size:13px;color:var(--muted);margin-top:4px}
  .result-label{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:8px}
  .result-pct{font-size:16px;color:var(--muted);margin-bottom:2rem}
  .result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .rs{background:var(--surface);padding:1.5rem;text-align:center}
  .rs-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;display:block;margin-bottom:0.5rem}
  .rs-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .result-quiz-layout{display:grid;grid-template-columns:280px 1fr;gap:2rem}
  .review-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;height:fit-content;position:sticky;top:2rem;max-height:calc(100vh - 4rem);overflow-y:auto}
  .review-list{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .review-number{width:100%;aspect-ratio:1;background:var(--surface2);border:2px solid transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
  .review-number.correct{background:rgba(34,196,122,.15);border-color:var(--green);color:var(--green)}
  .review-number.incorrect{background:rgba(255,90,90,.15);border-color:var(--red);color:var(--red)}
  .review-number:hover{transform:scale(1.05)}
  .review-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem}
  .review-item{margin-bottom:2rem}
  .review-header{margin-bottom:1.5rem}
  .review-q{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:1rem}
  .review-answers{font-size:13px;line-height:1.8}
  .ans-label{color:var(--muted);display:block;margin-bottom:0.3rem}
  .ans-correct{color:var(--green);font-weight:600}
  .ans-wrong{color:var(--red);font-weight:600}
  .ans-exp{color:var(--muted);margin-top:0.8rem;font-size:12px;line-height:1.6;padding:0.8rem;background:rgba(34,196,122,.05);border-left:2px solid var(--accent);border-radius:4px}
  .ref-pill{display:inline-flex;align-items:center;gap:6px;margin-top:1rem;background:rgba(34,196,122,.08);border:1px solid rgba(34,196,122,.2);border-radius:6px;padding:6px 12px;font-size:11px;color:#7FDC9F}
  .ref-pill svg{width:12px;height:12px}
  .result-actions{display:flex;gap:12px;justify-content:center;margin-top:3rem}
  .breadcrumb-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;margin-bottom:2rem;transition:color .2s}
  .breadcrumb-back:hover{color:var(--text)}
  .breadcrumb-back svg{width:14px;height:14px}

  /* --- FEEDBACK INMEDIATO --- */
  .opt.correct{border-color:var(--green);background:var(--green-bg);cursor:default}
  .opt.correct .opt-radio{border-color:var(--green);background:var(--green)}
  .opt.correct .opt-radio::after{content:'✓';color:#0D0F14;font-size:10px;font-weight:700;width:auto;height:auto;background:none;border-radius:0}
  .opt.incorrect{border-color:var(--red);background:var(--red-bg);cursor:default}
  .opt.incorrect .opt-radio{border-color:var(--red)}
  .opt.disabled{cursor:default;pointer-events:none}
  .q-feedback{display:none;font-size:13px;color:var(--muted);line-height:1.6;margin-top:1rem;padding:.75rem 1rem;background:rgba(255,255,255,.03);border-left:2px solid var(--accent);border-radius:4px}
  .question-card.answered .q-feedback{display:block}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:1024px){
    .result-quiz-layout{grid-template-columns:1fr;gap:1.5rem}
    .review-sidebar{position:static;max-height:none;margin-bottom:1.5rem}
  }
  @media(max-width:600px){
    .container{padding:1.5rem 1rem 3rem}
    .review-list{grid-template-columns:repeat(3,1fr)}
    .question-card{padding:1.5rem}
    .quiz-footer{text-align:center}
    .btn-nav{width:100%;justify-content:center}
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div id="screen-intro"></div>
  <div id="screen-quiz">
    <a class="breadcrumb-back" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al portal
    </a>
    <div class="quiz-header">
      <div class="progress-wrap">
        <div class="progress-info"><span>Respondidas</span><strong id="prog-count">0 / 0</strong></div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="questions-container" id="questions-container"></div>
    <div class="quiz-footer">
      <button class="btn-nav primary" id="btn-evaluate" onclick="evaluateQuiz()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Evaluar
      </button>
    </div>
  </div>
  <div id="screen-result"></div>
</div>

<script>
const QUIZ_CONFIG = {
meta: {
  pageTitle:   "Quiz — Leyes y Reglamentos",
  logoLabel:   "Leyes y Reglamentos",
  heroTag:     "Tercer Crédito · 31 preguntas",
  heroTitle:   ["Leyes y", "<em>Reglamentos</em>", "de Tránsito"],
  description: "Evalúa tu conocimiento sobre sanciones, contravenciones, multas y normativa de tránsito ecuatoriana.",
},
source: {
  label:    "Fuente del material",
  title:    "Cuestionario Tercer Crédito - Ley y Reglamento de Tránsito",
  subtitle: "Sanciones, contravenciones y normativa de transporte",
  pages:    "Legislación oficial",
  note:     "Basado en el cuestionario oficial de educación vial ecuatoriana.",
},
topics: [
  "Estacionamiento y prohibiciones",
  "Seguridad de pasajeros",
  "Contaminación ambiental",
  "Contravenciones y puntos",
  "Cuerpos normativos",
  "Luces y equipos",
  "Conducción en mal estado",
  "Embriaguez y alcohol",
  "Licencia de conducir",
  "Condiciones del vehículo",
],
grading: [
  { min: 90, label: "¡Excelente!",       color: "#22C47A" },
  { min: 70, label: "Muy bien",           color: "#4F8EF7" },
  { min: 50, label: "Aprobado",           color: "#F5A623" },
  { min:  0, label: "Sigue practicando", color: "#FF5A5A" },
],
questions: [
  { section: "Estacionamiento", q: "¿Cuál es la multa en el caso de obstaculizar o estacionar su vehículo en sitios prohibidos o destinados a uso exclusivo de personas con discapacidad o mujeres embarazadas?", opts: ["30% de un salario básico unificado", "40% de un salario básico unificado", "10% de un salario básico unificado"], ans: 2, exp: "La sanción por estacionar en sitios prohibidos es del 10% de un salario básico unificado.", ref: { page: 1, section: "Estacionamiento", detail: "Multa por estacionamiento indebido" } },
  { section: "Seguridad de pasajeros", q: "¿Cuál es el valor de la multa en el caso de conducir un vehículo en el que transporte a niños sin las correspondientes seguridades?", opts: ["15% de un salario básico unificado", "50% de un salario básico unificado", "10% de un salario básico unificado"], ans: 2, exp: "La multa por transportar niños sin seguridades es del 10% del salario básico.", ref: { page: 1, section: "Seguridad", detail: "Protección de menores" } },
  { section: "Contaminación", q: "¿Cuál es la sanción económica para la persona que desde el interior de un vehículo arroje a la vía pública desechos que contaminen el ambiente?", opts: ["Multa equivalente al 5% de un salario básico", "Multa equivalente al 10% de un salario básico", "Multa equivalente al 30% de un salario básico"], ans: 2, exp: "La sanción por contaminación es del 30% del salario básico.", ref: { page: 1, section: "Contaminación", detail: "Sanciones ambientales" } },
  { section: "Emergencias", q: "¿Cuál es la sanción para el peatón que ante las señales de alarma o toque de sirena de un vehículo de emergencia, no deje la vía libre?", opts: ["Multa equivalente al 10% de un salario básico", "Multa equivalente al 5% de un salario básico", "Multa equivalente al 20% de un salario básico"], ans: 1, exp: "La sanción para peatones que no ceden paso a emergencias es del 5% del salario básico.", ref: { page: 1, section: "Emergencias", detail: "Vehículos de emergencia" } },
  { section: "Distancia seguimiento", q: "¿Cuál es la sanción para quien conduce sin mantener una distancia prudente de seguimiento?", opts: ["Multa del 40% de un salario básico", "Multa del 30% de un salario básico", "Multa equivalente al 5% de un salario básico"], ans: 1, exp: "La sanción por no mantener distancia de seguimiento es del 30% del salario básico.", ref: { page: 1, section: "Distancia", detail: "Seguridad vial" } },
  { section: "Dispositivos sonoros", q: "¿Cuál es la sanción que recibirá si usa inadecuadamente y reiteradamente la bocina u otros dispositivos sonoros?", opts: ["Multa equivalente al 10% de un salario básico unificado", "Multa equivalente al 30% de un salario básico", "Multa equivalente al 5% de un salario básico"], ans: 2, exp: "La sanción por uso inadecuado de bocina es del 5% del salario básico.", ref: { page: 1, section: "Equipos", detail: "Dispositivos sonoros" } },
  { section: "Licencia de conducir", q: "¿Cuántos puntos de la licencia perderá si conduce un vehículo automotor sin portar su licencia de conducir?", opts: ["Ninguno", "Cinco", "Nueve"], ans: 1, exp: "Se pierden 5 puntos de la licencia por conducir sin portar licencia.", ref: { page: 2, section: "Licencia", detail: "Validación de documentos" } },
  { section: "Vías exclusivas", q: "¿Cuántos puntos de su licencia perderá si invade con su vehículo las vías exclusivas asignadas a los buses de transporte rápido?", opts: ["10", "Ninguno", "3"], ans: 0, exp: "Se pierden 10 puntos por invadir vías exclusivas de transporte rápido.", ref: { page: 2, section: "Vías exclusivas", detail: "Uso de carriles especiales" } },
  { section: "Cuerpos normativos", q: "¿En qué cuerpo normativo se encuentran detalladas las contravenciones de tránsito?", opts: ["Código Orgánico Integral Penal", "Ley Orgánica de Transporte Terrestre, Tránsito y Seguridad Vial", "Ordenanzas Municipales"], ans: 1, exp: "Las contravenciones de tránsito se encuentran en la Ley Orgánica de Transporte Terrestre, Tránsito y Seguridad Vial.", ref: { page: 2, section: "Normas", detail: "Marco legal" } },
  { section: "Contravenciones", q: "¿Es una contravención realizar actividades o competencias deportivas en las vías públicas, con vehículos de tracción humana o animal?", opts: ["No, si tienen permiso", "No", "Sí, es una contravención"], ans: 2, exp: "Realizar competencias deportivas en vías públicas es una contravención de tránsito.", ref: { page: 2, section: "Contravenciones", detail: "Actividades prohibidas" } },
  { section: "Luces y equipos", q: "¿Puede ser sancionado el conductor que no encienda las luces del vehículo en horas de la noche o conduzca en sitios oscuros como túneles, con las luces apagadas?", opts: ["Sí, con un llamado de atención de la autoridad", "Sí, por cometer una contravención", "No, ya que no se considera una contravención"], ans: 1, exp: "Es una contravención no encender las luces en horas nocturnas o en sitios oscuros.", ref: { page: 2, section: "Luces", detail: "Equipamiento obligatorio" } },
  { section: "Conducta de conductores", q: "¿Puede ser sancionado la o el conductor, controlador o ayudante de transporte público o comercial que maltrate de obra o de palabra a los usuarios?", opts: ["Sí, por cometer una contravención de sexta clase", "Sí, solo si la persona afectada cuenta con su documento de identificación", "No, ya que no se considera una contravención"], ans: 0, exp: "Es una contravención de sexta clase maltratar a usuarios en transporte público.", ref: { page: 2, section: "Conducta", detail: "Trato a pasajeros" } },
  { section: "Combustible", q: "¿Si se queda sin combustible y por esa razón obstaculiza el tránsito vehicular, está cometiendo una contravención?", opts: ["No", "Sí", "No es una contravención si las condiciones climáticas son desfavorables"], ans: 1, exp: "Quedarse sin combustible y obstruir el tránsito es una contravención.", ref: { page: 2, section: "Combustible", detail: "Responsabilidad del conductor" } },
  { section: "Traspaso de dominio", q: "La o el comprador de un vehículo que no realice el traspaso de dominio dentro del plazo de treinta días, contados a partir de la fecha del respectivo contrato será sancionado con:", opts: ["Multa equivalente al 50% de un salario básico", "Multa equivalente al 10% de un salario básico", "Multa equivalente al 5% de un salario básico"], ans: 2, exp: "La sanción por no realizar traspaso de dominio es del 5% del salario básico.", ref: { page: 3, section: "Traspaso", detail: "Documentación vehicular" } },
  { section: "Pruebas", q: "La prueba de alcoholemia se mide en:", opts: ["Grados / litro de sangre", "Miligramos / litro de sangre", "Gramos / Litro de sangre"], ans: 2, exp: "La alcoholemia se mide en gramos por litro de sangre.", ref: { page: 3, section: "Pruebas", detail: "Medición de alcohol" } },
  { section: "Exceso de velocidad", q: "Si conduce un vehículo automotor, excediendo los límites de velocidad fuera del rango moderado establecido, será sancionado con:", opts: ["Reducción 10 puntos en su licencia", "Pena privativa de libertad de 3 días, multa de un salario básico y reducción de 10 puntos", "Multa de un salario básico unificado"], ans: 1, exp: "El exceso grave de velocidad incluye pena privativa de libertad, multa y pérdida de puntos.", ref: { page: 3, section: "Velocidad", detail: "Límites de velocidad" } },
  { section: "Sustancias ilícitas", q: "Si conduce un vehículo bajo los efectos de sustancias estupefacientes, psicotrópicas o preparados que las contengan, será sancionada con:", opts: ["Reducción de 15 puntos, 30 días de privación de libertad y aprehensión del vehículo", "Reducción de 5 puntos y 15 días de privación de libertad", "Reducción de 15 puntos y aprehensión del vehículo por 24 horas"], ans: 0, exp: "Conducir bajo efectos de drogas resulta en 15 puntos, 30 días de cárcel y aprehensión del vehículo.", ref: { page: 3, section: "Drogas", detail: "Conducción bajo sustancias ilícitas" } },
  { section: "Transporte público", q: "Si conduce un vehículo de transporte público liviano o pesado, comercial o de carga y excede el nivel máximo de alcohol, será sancionado con:", opts: ["Pena privativa de libertad de 90 días como medida preventiva", "Pérdida de 30 puntos, pena privativa de 90 días y aprehensión del vehículo", "Pérdida de treinta puntos y pena privativa de 90 días"], ans: 1, exp: "En transporte público con alcohol máximo: 30 puntos, 90 días cárcel y aprehensión de vehículo.", ref: { page: 3, section: "Transporte", detail: "Conductores profesionales" } },
  { section: "Embriaguez leve", q: "Si conduce un vehículo en estado de embriaguez y el nivel de alcohol por litro de sangre es de 0,3 a 0,8 gramos, será sancionado con:", opts: ["Multa de un salario, pérdida de 5 puntos, 5 días de privación y aprehensión del vehículo", "Multa de 2 salarios, pérdida de 10 puntos y quince días de privación", "Suspensión de 60 días y 30 días de privación"], ans: 0, exp: "En embriaguez leve (0,3-0,8g): multa, 5 puntos, 5 días cárcel y aprehensión.", ref: { page: 3, section: "Alcohol", detail: "Nivel moderado de alcohol" } },
  { section: "Embriaguez moderada", q: "Si conduce un vehículo en estado de embriaguez y el nivel de alcohol por litro de sangre es mayor de 0,8 hasta 1,2 gramos, será sancionado con:", opts: ["Multa de un salario, pérdida de cinco puntos y cinco días de privación", "Multa de 2 salarios, pérdida de 10 puntos, 15 días de privación y aprehensión del vehículo", "Suspensión de 60 días y 30 días de privación"], ans: 1, exp: "En embriaguez moderada (0,8-1,2g): multa de 2 salarios, 10 puntos, 15 días y aprehensión.", ref: { page: 3, section: "Alcohol", detail: "Nivel elevado de alcohol" } },
  { section: "Embriaguez grave", q: "Si conduce un vehículo en estado de embriaguez y el nivel de alcohol por litro de sangre supera 1,2 gramos, será sancionado con:", opts: ["Multa de un salario, pérdida de 5 puntos y 5 días de privación", "Multa de 2 salarios, pérdida de 10 puntos y 15 días", "Multa de 3 salarios, suspensión de 60 días, 30 días de privación y aprehensión del vehículo"], ans: 2, exp: "En embriaguez grave (>1,2g): multa de 3 salarios, suspensión 60 días, 30 días cárcel y aprehensión.", ref: { page: 3, section: "Alcohol", detail: "Nivel grave de alcohol" } },
  { section: "Licencia de conducir", q: "Si conduce un vehículo sin haber obtenido previamente la licencia de conducir, será sancionado con:", opts: ["Multa de un salario y 10 días de privación", "Pena privativa de libertad de 3 días", "Privación de 3 días, multa de un salario, vehículo detenido hasta cancelar, responsabilidad solidaria del propietario"], ans: 2, exp: "Conducir sin licencia: 3 días cárcel, multa, vehículo detenido y responsabilidad del propietario.", ref: { page: 4, section: "Licencia", detail: "Validación de licencia" } },
  { section: "Neumáticos", q: "Si usted conduce un vehículo cuyas llantas se encuentren lisas o en mal estado, será sancionado con:", opts: ["Disminución de 6 puntos en la licencia", "Pena de 5 a 15 días, disminución de 5 puntos y retención del vehículo", "Disminución de 7 puntos, retención del vehículo hasta superar la infracción"], ans: 2, exp: "Llantas lisas o mal estado: 7 puntos perdidos y retención del vehículo.", ref: { page: 4, section: "Neumáticos", detail: "Condiciones del vehículo" } },
  { section: "Sobrecarga", q: "El conductor de transporte por cuenta propia o comercial que exceda el número de pasajeros o volumen de carga de capacidad del automotor, será sancionado con:", opts: ["Multa de un salario unificado", "Multa de un salario y reducción de 9 puntos", "Multa del 50% de un salario, reducción de 9 puntos"], ans: 2, exp: "Sobrecarga: multa del 50% y pérdida de 9 puntos de la licencia.", ref: { page: 4, section: "Sobrecarga", detail: "Capacidad del vehículo" } },
  { section: "Cinturón de seguridad", q: "¿Cuál es la sanción para quien conduce sin utilizar el cinturón de seguridad?", opts: ["Multa equivalente al 15% de un salario básico", "Multa equivalente al 5% de un salario básico", "Multa equivalente al 10% de un salario básico"], ans: 2, exp: "No usar cinturón de seguridad: multa del 10% del salario básico.", ref: { page: 4, section: "Seguridad", detail: "Equipamiento de seguridad" } },
  { section: "Equipos de video", q: "Los propietarios de vehículos de servicio público, comercial o privado que instalen equipos de video o televisión en sitios que provocan la distracción del conductor, serán sancionados con:", opts: ["Multa equivalente al 10% de un salario básico", "Multa equivalente al 15% de un salario básico", "Multa equivalente al 50% de un salario básico"], ans: 2, exp: "Instalar equipos distractores: multa del 50% del salario básico.", ref: { page: 4, section: "Equipos", detail: "Distracciones del conductor" } },
  { section: "Basura en transporte", q: "¿Cuál es la sanción económica que recibirá si como conductor de un vehículo de transporte público o comercial no pone a disposición de los pasajeros recipientes o fundas para recolección de basura o desechos?", opts: ["Multa equivalente al 10% de un salario básico", "Multa equivalente al 5% de un salario básico", "Multa equivalente al 15% de un salario básico"], ans: 2, exp: "No proporcionar basureros: multa del 15% del salario básico.", ref: { page: 4, section: "Limpieza", detail: "Transporte público limpio" } },
  { section: "Permisos de operación", q: "¿Cuál es la sanción que se le aplica al conductor de transporte de pasajeros o bienes que conduzca sin contar con el respectivo permiso o contrato de operación?", opts: ["Multa de 2 salarios, 10 puntos, retención mínimo 7 días", "Multa de 2 salarios, 5 puntos, retención mínimo 5 días", "Multa de 2 salarios, 7 puntos, retención mínimo 7 días"], ans: 2, exp: "Sin permiso de operación: multa de 2 salarios, 7 puntos, retención 7 días.", ref: { page: 4, section: "Permisos", detail: "Documentación de operación" } },
  { section: "Permisos", q: "¿Cuál es la sanción que se le aplica al conductor de transporte de pasajeros o bienes que conduzca sin contar con el respectivo permiso o contrato de operación?", opts: ["Multa equivalente a 2 salarios, reducción de 10 puntos y retención mínimo de 7 días", "Multa equivalente a 2 salarios, reducción de 5 puntos y retención mínimo de 5 días", "Multa equivalente a 2 salarios, reducción de 7 puntos y retención mínimo de 7 días"], ans: 0, exp: "Conducir sin permiso de operación: multa de 2 salarios, 10 puntos y retención de 7 días.", ref: { page: 4, section: "Permisos", detail: "Requisito de operación" } },
  { section: "Seguridad de pasajeros", q: "¿Cuál es la sanción en el caso de conducir un vehículo en el que transporte a niños sin las correspondientes seguridades?", opts: ["Multa equivalente al 15% de 1 salario básico", "Multa equivalente al 50% de 1 salario básico", "Multa equivalente al 10% de 1 salario básico"], ans: 2, exp: "Transportar niños sin seguridades: multa del 10% del salario básico.", ref: { page: 4, section: "Seguridad", detail: "Protección infantil" } },
  { section: "Contaminación ambiental", q: "¿Cuál es la sanción para la persona que desde el interior de un vehículo arroje a la vía pública desechos que contaminen el ambiente?", opts: ["Multa equivalente al 5% de 1 salario básico", "Multa equivalente al 10% de 1 salario básico", "Multa equivalente al 30% de 1 salario básico"], ans: 2, exp: "Arrojar desechos contaminantes desde el vehículo: multa del 30% del salario básico.", ref: { page: 4, section: "Contaminación", detail: "Responsabilidad ambiental" } },
]
};

let currentIndex = 0;
let answers = {};

function initQuiz() {
  document.title = QUIZ_CONFIG.meta.pageTitle;
  renderIntro();
}

function renderIntro() {
  const intro = document.getElementById('screen-intro');
  const { meta, source, topics, questions } = QUIZ_CONFIG;

  intro.innerHTML = `
    <div class="breadcrumb">
      <a class="breadcrumb-link" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Portal
      </a>
      <span class="breadcrumb-separator">/</span>
      <span style="font-size:12px;color:var(--text)">${meta.logoLabel}</span>
    </div>
    <div class="logo-row">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <div class="logo-text">${meta.logoLabel}</div>
    </div>
    <div class="hero-tag">${meta.heroTag}</div>
    <h1 class="hero-title">${meta.heroTitle.join(' ')}</h1>
    <p class="hero-desc">${meta.description}</p>
    <div class="stats-row">
      <div class="stat"><span class="stat-num">${questions.length}</span><span class="stat-lbl">Preguntas</span></div>
      <div class="stat"><span class="stat-num">${topics.length}</span><span class="stat-lbl">Temas</span></div>
    </div>
    <div class="topics">${topics.map(t => `<div class="topic-chip"><div class="topic-dot"></div>${t}</div>`).join('')}</div>
    <div class="source-box">
      <strong>${source.label}</strong>
      ${source.title}<br/>
      <small style="color:rgba(165,232,181,0.8)">${source.subtitle}</small>
    </div>
    <button class="btn-start" onclick="startQuiz()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Comenzar prueba
    </button>
  `;
}

function startQuiz() {
  document.getElementById('screen-intro').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderAllQuestions();
  updateProgress();
}

function renderAllQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = QUIZ_CONFIG.questions.map((q, i) => {
    const answered = answers[i] !== undefined;
    const userChoice = answers[i];
    const correctIdx = q.ans;
    const optsHTML = q.opts.map((opt, j) => {
      let cls = 'opt';
      if (answered) {
        cls += ' disabled';
        if (j === correctIdx) cls += ' correct';
        else if (j === userChoice) cls += ' incorrect';
      }
      return `<div class="${cls}" onclick="answerQuestion(${i}, ${j})"><div class="opt-radio"></div><div class="opt-text">${opt}</div></div>`;
    }).join('');
    return `
      <div class="question-card ${answered ? 'answered' : ''}" id="qcard-${i}">
        <div class="q-meta">
          <span class="q-num-badge">P${i+1}</span>
          <div class="section-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            ${q.section}
          </div>
        </div>
        <h2 class="q-title">${q.q}</h2>
        <div class="options">${optsHTML}</div>
        <div class="q-feedback">${q.exp}</div>
      </div>`;
  }).join('');
}

function answerQuestion(qIdx, optIdx) {
  if (answers[qIdx] !== undefined) return;
  answers[qIdx] = optIdx;
  const q = QUIZ_CONFIG.questions[qIdx];
  const correctIdx = q.ans;
  const card = document.getElementById('qcard-' + qIdx);
  card.classList.add('answered');
  card.querySelectorAll('.opt').forEach((el, j) => {
    el.classList.add('disabled');
    if (j === correctIdx) el.classList.add('correct');
    else if (j === optIdx) el.classList.add('incorrect');
  });
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = QUIZ_CONFIG.questions.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('prog-count').textContent = `${answered} / ${total}`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function updateButtons() {
  const allAnswered = Object.keys(answers).length === QUIZ_CONFIG.questions.length;
  document.getElementById('btn-evaluate').disabled = !allAnswered;
}

function evaluateQuiz() {
  if (Object.keys(answers).length < QUIZ_CONFIG.questions.length) {
    alert('Por favor responde todas las preguntas antes de evaluar');
    return;
  }
  renderResult();
}

function renderResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';

  let correctCount = 0;
  QUIZ_CONFIG.questions.forEach((q, i) => {
    if (answers[i] === q.ans) correctCount++;
  });

  const total = QUIZ_CONFIG.questions.length;
  const pct = Math.round((correctCount / total) * 100);
  const gradeObj = QUIZ_CONFIG.grading.find(g => pct >= g.min);

  const result = document.getElementById('screen-result');
  const circumference = 2 * Math.PI * 85;
  const strokeDashoffset = circumference - (pct / 100) * circumference;

  let reviewHTML = '';
  QUIZ_CONFIG.questions.forEach((q, i) => {
    const isCorrect = answers[i] === q.ans;
    const userAns = q.opts[answers[i]];
    const correctAns = q.opts[q.ans];

    reviewHTML += `
      <div class="review-item">
        <div class="review-header">
          <div class="review-q">P${i + 1}: ${q.q}</div>
        </div>
        <div class="review-answers">
          <span class="ans-label">Tu respuesta:</span>
          <div class="${isCorrect ? 'ans-correct' : 'ans-wrong'}">${userAns || '(no respondida)'}</div>
          ${!isCorrect ? `<span class="ans-label" style="margin-top:0.5rem;display:block">Respuesta correcta:</span><div class="ans-correct">${correctAns}</div>` : ''}
          <div class="ans-exp">${q.exp}</div>
          <div class="ref-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            ${q.ref.section}
          </div>
        </div>
      </div>
    `;
  });

  result.innerHTML = `
    <a class="breadcrumb-back" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al portal
    </a>
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 180 180">
          <circle class="track" cx="90" cy="90" r="85"/>
          <circle class="ring-fill" cx="90" cy="90" r="85" stroke="${gradeObj.color}" style="stroke-dasharray:${circumference};stroke-dashoffset:${strokeDashoffset}"/>
        </svg>
        <div class="score-inner">
          <div class="score-num">${correctCount}</div>
          <div class="score-denom">/ ${total}</div>
        </div>
      </div>
      <div class="result-label" style="color:${gradeObj.color}">${gradeObj.label}</div>
      <div class="result-pct">${pct}% correcto</div>
    </div>
    <div class="result-stats">
      <div class="rs">
        <span class="rs-num" style="color:var(--green)">${correctCount}</span>
        <span class="rs-lbl">Correctas</span>
      </div>
      <div class="rs">
        <span class="rs-num" style="color:var(--red)">${total - correctCount}</span>
        <span class="rs-lbl">Incorrectas</span>
      </div>
      <div class="rs">
        <span class="rs-num">${pct}%</span>
        <span class="rs-lbl">Porcentaje</span>
      </div>
    </div>
    <div class="result-quiz-layout">
      <div class="review-sidebar">
        <div class="sidebar-title">Resultados</div>
        <div class="review-list">
          ${QUIZ_CONFIG.questions.map((q, i) => {
            const isCorrect = answers[i] === q.ans;
            return `<div class="review-number ${isCorrect ? 'correct' : 'incorrect'}" onclick="scrollToReview(${i})">${i + 1}</div>`;
          }).join('')}
        </div>
      </div>
      <div class="review-content" id="review-content">
        ${reviewHTML}
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-nav" onclick="retryQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/></svg>
        Reintentar
      </button>
      <button class="btn-nav primary" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Volver al portal
      </button>
    </div>
  `;
  window.scrollTo(0, 0);
}

function scrollToReview(idx) {
  const reviewContent = document.getElementById('review-content');
  if (reviewContent) {
    reviewContent.children[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function retryQuiz() {
  answers = {};
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderAllQuestions();
  updateProgress();
  window.scrollTo(0, 0);
}

function goHome() {
  window.location.href = '../index.html';
}

initQuiz();
</script>
</body>
</html>
