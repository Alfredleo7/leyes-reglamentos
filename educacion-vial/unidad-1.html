<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Educación Vial · Unidad 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0D0F14; --surface:#161A23; --surface2:#1E2330;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
      --accent:#F5C518; --accent2:#E8A900;
      --text:#F0F2F8; --muted:#7A8099;
      --green:#22C47A; --red:#FF5A5A;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,24,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,24,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
    .glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(245,197,24,0.06) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0}

    .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

    /* HEADER */
    .header{margin-bottom:3rem;display:flex;align-items:center;justify-content:space-between}
    .breadcrumb{display:flex;align-items:center;gap:8px}
    .breadcrumb-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .15s}
    .breadcrumb-link:hover{color:var(--text)}
    .breadcrumb-separator{color:var(--border);margin:0 4px}

    .progress-bar{width:200px;height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s ease}

    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
    .logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
    .logo-badge svg{width:20px;height:20px;color:#0D0F14}
    .logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

    .hero-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(245,197,24,.3);padding:4px 12px;border-radius:20px;margin-bottom:1.5rem}
    .hero-title{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,48px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem}
    .hero-title em{font-style:normal;color:var(--accent)}
    .hero-desc{font-size:16px;color:var(--muted);line-height:1.7;max-width:540px;margin-bottom:2rem}

    /* QUIZ CONTAINER */
    .quiz-state-initial,
    .quiz-state-answering,
    .quiz-state-result { display:none }
    .quiz-state-initial.active,
    .quiz-state-answering.active,
    .quiz-state-result.active { display:block }

    .questions-container{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;margin-bottom:3rem}

    .question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;transition:all .2s}
    .question-card.answered{border-color:var(--accent)}
    .question-card:hover:not(.answered){border-color:rgba(245,197,24,.3)}

    .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem;font-size:12px;color:var(--muted)}
    .q-num-badge{font-family:'Syne';font-weight:700;color:var(--accent)}
    .q-topic{font-size:11px;letter-spacing:.08em;text-transform:uppercase}

    .q-text{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:1.5rem;color:var(--text)}

    .q-options{display:flex;flex-direction:column;gap:10px}
    .q-option{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s}
    .q-option:hover{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.2)}
    .q-option.selected{background:var(--accent);border-color:var(--accent);color:#0D0F14}
    .q-option.correct{background:rgba(34,196,122,.15);border-color:var(--green)}
    .q-option.incorrect{background:rgba(255,90,90,.15);border-color:var(--red)}

    .q-option-radio{width:18px;height:18px;border:2px solid var(--muted);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .q-option.selected .q-option-radio{border-color:var(--text);background:#0D0F14}
    .q-option.selected .q-option-radio::after{content:'';width:6px;height:6px;background:#0D0F14;border-radius:50%}
    .q-option.correct .q-option-radio{border-color:var(--green);background:var(--green)}
    .q-option.correct .q-option-radio::after{content:'✓';color:#0D0F14;font-size:10px;font-weight:700}
    .q-option.incorrect .q-option-radio{border-color:var(--red)}

    .q-explanation{font-size:13px;color:var(--muted);line-height:1.6;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:none}
    .question-card.answered .q-explanation{display:block}

    .quiz-footer{max-width:760px;margin:0 auto;text-align:right}
    .quiz-footer button{background:var(--accent);color:#0D0F14;border:none;border-radius:10px;padding:12px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}
    .quiz-footer button:hover{background:var(--accent2);transform:translateX(2px)}

    .result-container{max-width:760px;margin:0 auto;text-align:center}
    .result-score{font-family:'Syne';font-size:clamp(48px,10vw,72px);font-weight:800;margin-bottom:1rem}
    .result-score.excellent{color:var(--accent)}
    .result-score.good{color:var(--green)}
    .result-score.fair{color:var(--text)}
    .result-score.poor{color:var(--red)}

    .result-ring-container{width:240px;height:240px;margin:0 auto 2rem;position:relative}
    .result-ring{width:100%;height:100%;border-radius:50%}
    .result-ring-bg{position:absolute;inset:0;border-radius:50%;border:12px solid var(--surface2)}
    .result-ring-stroke{position:absolute;inset:0;border-radius:50%;border:12px solid var(--accent);border-bottom-color:transparent;border-left-color:transparent;stroke-dasharray:150 628;stroke-dashoffset:0;animation:fillRing 1.2s ease-out forwards}
    @keyframes fillRing{from{stroke-dashoffset:628}to{stroke-dashoffset:0}}

    .result-message{font-size:18px;font-weight:600;color:var(--text);margin-bottom:1rem}
    .result-details{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:2rem}
    .result-stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem;font-size:13px}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem}
    .stat-label{color:var(--muted);margin-bottom:.5rem}
    .stat-value{font-family:'Syne';font-size:24px;font-weight:700;color:var(--accent)}

    @media(max-width:768px){
      .header{flex-direction:column;align-items:flex-start;gap:1rem}
      .progress-bar{width:100%}
      .result-stats{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="header">
    <div class="breadcrumb">
      <a class="breadcrumb-link" href="./index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Volver
      </a>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="logo-row">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/></svg>
    </div>
    <div class="logo-text">Educación Vial</div>
  </div>

  <div class="hero-tag">Unidad 1 · 30 preguntas</div>
  <h1 class="hero-title">Factores del <em>Sistema Vial</em></h1>
  <p class="hero-desc">Evalúa tu conocimiento sobre el factor humano, vial y ambiental en el tránsito. Responde todas las preguntas para obtener tu resultado.</p>

  <div class="quiz-state-initial active">
    <button class="unit-button" style="display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#0D0F14;border:none;border-radius:10px;padding:12px 24px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;text-decoration:none;transition:all .2s" id="startBtn">
      Comenzar Quiz
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="quiz-state-answering">
    <div class="questions-container" id="questionsContainer"></div>
    <div class="quiz-footer">
      <button id="submitBtn">Enviar Respuestas</button>
    </div>
  </div>

  <div class="quiz-state-result">
    <div class="result-container">
      <div class="result-ring-container">
        <div class="result-ring-bg"></div>
        <svg class="result-ring" viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="12" stroke-dasharray="150 628"/></svg>
      </div>
      <div class="result-score" id="resultScore">0%</div>
      <div class="result-message" id="resultMessage">Resultado</div>
      <div class="result-details" id="resultDetails">Detalles del resultado</div>
      <div class="result-stats">
        <div class="stat">
          <div class="stat-label">Respuestas correctas</div>
          <div class="stat-value" id="correctCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Respuestas incorrectas</div>
          <div class="stat-value" id="incorrectCount">0</div>
        </div>
      </div>
      <button id="retryBtn">Intentar de nuevo</button>
    </div>
  </div>
</div>

<script>
const QUIZ_CONFIG = {
  meta: {
    pageTitle: "Quiz — Educación Vial · Unidad 1",
    logoLabel: "Educación Vial",
    heroTag: "Unidad 1 · 30 preguntas",
    heroTitle: "Factores del Sistema Vial",
    description: "Evalúa tu conocimiento sobre el factor humano, vial y ambiental en el tránsito."
  },
  topics: ["Tránsito", "Agente de tránsito", "Peatón", "Pasajero", "Ciclista", "Conductor", "Factor vial", "Tipos de vías", "Factor ambiental", "Clima y conducción"],
  questions: [
    {
      text: "La palabra \"tránsito\" proviene del latín y alude a:",
      options: [
        "La acción de circular por las vías sujeto a leyes y reglamentos.",
        "El conjunto de normas de convivencia entre conductores.",
        "El sistema de señalización de una ciudad."
      ],
      correct: 0,
      explanation: "Tránsito proviene del latín \"transitus\" y se refiere al movimiento de personas, animales y vehículos por las vías.",
      topic: "Tránsito"
    },
    {
      text: "¿Cuáles son los tres factores que intervienen en el sistema vial?",
      options: [
        "Humano, vial y ambiental.",
        "Conductor, vehículo y señalética.",
        "Velocidad, distancia y tiempo de reacción."
      ],
      correct: 0,
      explanation: "Los tres factores del sistema vial son el Factor Humano, el Factor Vial y el Factor Ambiental.",
      topic: "Tránsito"
    },
    {
      text: "El agente de tránsito es capacitado y formado por:",
      options: [
        "La Policía Nacional.",
        "La Agencia Nacional de Regulación y Control del Transporte Terrestre, Tránsito y Seguridad Vial (ANRT).",
        "El Ministerio de Transporte y Obras Públicas."
      ],
      correct: 1,
      explanation: "El agente de tránsito es un servidor público especializado formado y capacitado por la ANRT para ejercer el control a nivel nacional.",
      topic: "Agente de tránsito"
    },
    {
      text: "Se considera peatón a:",
      options: [
        "Toda persona que conduce un vehículo de motor.",
        "Toda persona que transita a pie o en silla de ruedas por las vías.",
        "Solo las personas que cruzan en pasos señalizados."
      ],
      correct: 1,
      explanation: "Son peatones las personas que transitan a pie o en silla de ruedas por las vías y aceras.",
      topic: "Peatón"
    },
    {
      text: "¿Cuál de los siguientes es un comportamiento INCORRECTO del peatón?",
      options: [
        "Cruzar por el paso peatonal.",
        "Respetar el semáforo en verde.",
        "Cruzar la calzada en forma diagonal."
      ],
      correct: 2,
      explanation: "Cruzar en diagonal es un comportamiento incorrecto y peligroso. Los peatones deben cruzar por los pasos autorizados de forma perpendicular.",
      topic: "Peatón"
    },
    {
      text: "En Ecuador, si un peatón comete una contravención de tránsito, la sanción es:",
      options: [
        "Privación de libertad.",
        "Multa económica.",
        "Suspensión de la licencia de conducir."
      ],
      correct: 1,
      explanation: "La infracción de tránsito de un peatón o ciclista en Ecuador se sanciona con multa económica.",
      topic: "Peatón"
    },
    {
      text: "Las personas con discapacidad tienen derecho preferencial en:",
      options: [
        "Solo en los semáforos en rojo.",
        "En intersecciones, pasos peatonales y cruces cebra; todos los usuarios viales deben cederles el paso.",
        "Solo en zonas escolares."
      ],
      correct: 1,
      explanation: "Personas con discapacidad, movilidad reducida y grupos vulnerables gozan de derechos preferenciales en intersecciones, pasos peatonales y cruces cebra.",
      topic: "Peatón"
    },
    {
      text: "Una dificultad frecuente de los adultos mayores como peatones es:",
      options: [
        "Corren más rápido que los vehículos.",
        "Tienen dificultades auditivas, visuales y para calcular la velocidad de los vehículos.",
        "Prefieren cruzar fuera de los pasos peatonales."
      ],
      correct: 1,
      explanation: "Los adultos mayores pueden tener dificultades auditivas/visuales y problemas para calcular velocidades, lo que los hace más vulnerables.",
      topic: "Peatón"
    },
    {
      text: "Estadísticamente, los niños más atropellados son:",
      options: [
        "Niñas entre 2 y 6 años.",
        "Varones entre 4 y 10 años, que irrumpen en la calzada jugando.",
        "Jóvenes entre 14 y 16 años."
      ],
      correct: 1,
      explanation: "La estadística muestra que varones entre 4 y 10 años son los más atropellados, generalmente por irrumpir en la calzada al jugar o ir tras un balón.",
      topic: "Peatón"
    },
    {
      text: "El conductor está obligado a ceder el paso al peatón cuando:",
      options: [
        "El peatón espera en la acera.",
        "El peatón se encuentra en movimiento cruzando la vía.",
        "El semáforo está en rojo para el peatón."
      ],
      correct: 1,
      explanation: "El conductor debe ceder el paso al transeúnte si éste se encuentra en movimiento cruzando la vía.",
      topic: "Peatón"
    },
    {
      text: "¿Cuál es un DEBER del peatón?",
      options: [
        "Cruzar la calzada por donde le resulte más conveniente.",
        "Usar los cruces peatonales, puentes peatonales o pasos subterráneos al cruzar una calle.",
        "Detener un vehículo poniéndose en medio de la pista."
      ],
      correct: 1,
      explanation: "Los peatones deben usar siempre los cruces autorizados (cebra, puente peatonal, paso subterráneo) para cruzar una vía.",
      topic: "Peatón"
    },
    {
      text: "¿Cuál de las siguientes es una PROHIBICIÓN del pasajero?",
      options: [
        "Exigir el respeto de las tarifas aprobadas.",
        "Denunciar irregularidades del servicio de transporte.",
        "Arrojar basura o desechos desde la ventana del vehículo."
      ],
      correct: 2,
      explanation: "Está prohibido al pasajero arrojar basura o desechos desde la ventana. Este comportamiento es una infracción de tránsito.",
      topic: "Pasajero"
    },
    {
      text: "¿Cuál es un DERECHO del pasajero?",
      options: [
        "Exigir al conductor que aumente la velocidad.",
        "Subir o bajar del vehículo mientras está en movimiento.",
        "Exigir velocidad adecuada y el respeto a las tarifas aprobadas."
      ],
      correct: 2,
      explanation: "El pasajero tiene derecho a ser transportado con servicio de calidad, tarifas legales y velocidad adecuada.",
      topic: "Pasajero"
    },
    {
      text: "La separación lateral mínima que debe mantener un ciclista al circular es:",
      options: [
        "0,5 metros.",
        "1,5 metros.",
        "3 metros."
      ],
      correct: 1,
      explanation: "El ciclista debe mantener una separación lateral suficiente de al menos 1,5 metros con otros vehículos.",
      topic: "Ciclista"
    },
    {
      text: "¿Cuál de las siguientes está PROHIBIDA para un ciclista?",
      options: [
        "Utilizar ropa reflectiva.",
        "Realizar señales manuales al maniobrar.",
        "Sujetarse a un vehículo en movimiento."
      ],
      correct: 2,
      explanation: "Está prohibido al ciclista sujetarse a vehículos en movimiento, rebasar en zig-zag y circular con dispositivos que distraigan la atención.",
      topic: "Ciclista"
    },
    {
      text: "El conductor es:",
      options: [
        "Cualquier persona que se sube a un vehículo.",
        "La persona legalmente facultada para conducir un vehículo por la vía pública, que debe portar sus documentos habilitantes.",
        "Solo quien tiene licencia profesional."
      ],
      correct: 1,
      explanation: "Conductor es la persona legalmente facultada para manejar un vehículo y debe portar siempre la licencia y la matrícula del vehículo.",
      topic: "Conductor"
    },
    {
      text: "¿Cuál es un DEBER del conductor?",
      options: [
        "Conducir sin licencia si conoce las vías.",
        "Prestar auxilio a los heridos si es protagonista de un accidente e informar a emergencias.",
        "Obstruir el paso en situaciones de tráfico."
      ],
      correct: 1,
      explanation: "Al ser protagonista de un accidente, el conductor debe prestar auxilio a heridos y notificar a los servicios de emergencia.",
      topic: "Conductor"
    },
    {
      text: "¿En cuántas categorías se clasifican las vías?",
      options: [
        "Dos: urbanas y rurales.",
        "Tres: urbanas, rurales y autopistas.",
        "Cuatro: urbanas, perimetrales, rurales y autopistas."
      ],
      correct: 2,
      explanation: "Las vías se clasifican en cuatro categorías: urbanas, perimetrales, rurales y autopistas.",
      topic: "Tipos de vías"
    },
    {
      text: "¿Qué es la calzada?",
      options: [
        "Parte de la vía de uso exclusivo para peatones.",
        "Parte de la vía de uso exclusivo para vehículos, ubicada entre los bordes del camino y las aceras.",
        "Zona central de separación de carriles."
      ],
      correct: 1,
      explanation: "La calzada es la parte de la vía destinada exclusivamente a los vehículos, comprendida entre los bordes del camino y las aceras.",
      topic: "Tipos de vías"
    },
    {
      text: "¿Qué es la acera o vereda?",
      options: [
        "Parte de la calzada para vehículos lentos.",
        "Zona de estacionamiento vehicular.",
        "Parte de la vía pública a los costados, de uso exclusivo para los peatones."
      ],
      correct: 2,
      explanation: "La acera o vereda es la parte de la vía ubicada a los costados, destinada exclusivamente al tránsito de peatones.",
      topic: "Tipos de vías"
    },
    {
      text: "¿Qué es el parterre o refugio?",
      options: [
        "Señal horizontal que indica una reducción de carril.",
        "Área o isla de seguridad central construida en las vías urbanas para encauzar vehículos o servir de refugio a peatones.",
        "Zona destinada al estacionamiento de motocicletas."
      ],
      correct: 1,
      explanation: "El parterre o refugio es el área o isla de seguridad central en vías urbanas que encauza el flujo vehicular y sirve de refugio a peatones.",
      topic: "Tipos de vías"
    },
    {
      text: "¿Qué es la berma o espaldón?",
      options: [
        "La cuneta que recoge el agua de lluvia.",
        "El carril exclusivo para ciclistas en vías rurales.",
        "Faja lateral adyacente a la calzada, destinada a peatones, semovientes y emergencias."

      correct: 2,
      explanation: "La berma o espaldón es la franja lateral junto a la calzada, usada por peatones, animales y para estacionamiento de emergencia.",
      topic: "Tipos de vías"
    },
    {
      text: "¿Cuál es una característica propia de las autopistas?",
      options: [
        "Tienen intersecciones a nivel y permiten el estacionamiento.",
        "Son vías de varios carriles con parterre central, sin cruces a nivel, y con estacionamiento prohibido.",
        "Son vías de un solo carril para tráfico rápido."
      ],
      correct: 1,
      explanation: "Las autopistas son vías de varios carriles separados por parterre central, sin cruces a nivel y con estacionamiento prohibido.",
      topic: "Tipos de vías"
    },
    {
      text: "Las vías perimetrales son:",
      options: [
        "Vías situadas dentro del centro poblado.",
        "Vías de descongestionamiento ubicadas fuera del perímetro urbano, que no se consideran carreteras.",
        "Equivalentes a las autopistas en zonas rurales."
      ],
      correct: 1,
      explanation: "Las vías perimetrales se ubican fuera del perímetro urbano como vías de descongestionamiento, pero no son carreteras.",
      topic: "Tipos de vías"
    },
    {
      text: "¿Qué porcentaje de accidentabilidad se atribuye al factor ambiental?",
      options: [
        "Menos del 5%.",
        "Entre el 10 y el 30%.",
        "Más del 50%."
      ],
      correct: 1,

let answers = {};
const states = {
  initial: document.querySelector('.quiz-state-initial'),
  answering: document.querySelector('.quiz-state-answering'),
  result: document.querySelector('.quiz-state-result')
};

function showState(stateName) {
  Object.values(states).forEach(s => s.classList.remove('active'));
  states[stateName].classList.add('active');
}

function startQuiz() {
  answers = {};
  showState('answering');
  renderAllQuestions();
  window.scrollTo(0, 0);
}

function renderAllQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  QUIZ_CONFIG.questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';

    const meta = document.createElement('div');
    meta.className = 'q-meta';
    meta.innerHTML = `
      <span class="q-num-badge">Pregunta ${idx + 1}</span>
      <span class="q-topic">${q.topic}</span>
    `;

    const text = document.createElement('div');
    text.className = 'q-text';
    text.textContent = q.text;

    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'q-options';

    q.options.forEach((opt, optIdx) => {
      const option = document.createElement('div');
      option.className = 'q-option';
      if (answers[idx] === optIdx) option.classList.add('selected');

      option.innerHTML = `
        <div class="q-option-radio"></div>
        <span>${opt}</span>
      `;

      option.addEventListener('click', () => answerQuestion(idx, optIdx));
      optionsDiv.appendChild(option);
    });

    const explanation = document.createElement('div');
    explanation.className = 'q-explanation';
    explanation.textContent = q.explanation;

    card.appendChild(meta);
    card.appendChild(text);
    card.appendChild(optionsDiv);
    card.appendChild(explanation);
    container.appendChild(card);
  });

  updateProgress();
}

function answerQuestion(qIdx, optIdx) {
  answers[qIdx] = optIdx;
  const cards = document.querySelectorAll('.question-card');
  const card = cards[qIdx];
  card.classList.add('answered');

  const options = card.querySelectorAll('.q-option');
  const correct = QUIZ_CONFIG.questions[qIdx].correct;

  options.forEach((opt, idx) => {
    opt.classList.remove('selected');
    if (idx === optIdx) {
      if (idx === correct) {
        opt.classList.add('correct');
      } else {
        opt.classList.add('incorrect');
      }
    }
    if (idx === correct && idx !== optIdx) {
      opt.classList.add('correct');
    }
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = QUIZ_CONFIG.questions.length;
  const percentage = (answered / total) * 100;
  document.querySelector('.progress-fill').style.width = percentage + '%';
}

function submitQuiz() {
  const unanswered = QUIZ_CONFIG.questions.length - Object.keys(answers).length;
  if (unanswered > 0) {
    alert(`Por favor responde todas las preguntas. Te faltan ${unanswered}.`);
    return;
  }
  evaluateQuiz();
}

function evaluateQuiz() {
  let correct = 0;
  QUIZ_CONFIG.questions.forEach((q, idx) => {
    if (answers[idx] === q.correct) correct++;
  });

  const percentage = Math.round((correct / QUIZ_CONFIG.questions.length) * 100);
  const total = QUIZ_CONFIG.questions.length;

  document.getElementById('resultScore').textContent = percentage + '%';
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('incorrectCount').textContent = total - correct;

  let message, details, scoreClass;
  if (percentage >= 90) {
    message = '¡Excelente!';
    details = 'Has dominado los factores del sistema vial. Felicidades por tu desempeño excepcional.';
    scoreClass = 'excellent';
  } else if (percentage >= 70) {
    message = 'Buen trabajo';
    details = 'Tienes un buen conocimiento de los factores del sistema vial. Sigue estudiando para mejorar.';
    scoreClass = 'good';
  } else if (percentage >= 50) {
    message = 'Satisfecho';
    details = 'Has alcanzado una calificación media. Repasa los temas para fortalecer tus conocimientos.';
    scoreClass = 'fair';
  } else {
    message = 'Necesitas mejorar';
    details = 'Tu calificación está por debajo del promedio. Te recomendamos repasar todo el contenido de la unidad.';
    scoreClass = 'poor';
  }

  document.getElementById('resultMessage').textContent = message;
  document.getElementById('resultDetails').textContent = details;
  document.getElementById('resultScore').className = 'result-score ' + scoreClass;

  showState('result');
  window.scrollTo(0, 0);
}

function retryQuiz() {
  startQuiz();
}

document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('submitBtn').addEventListener('click', submitQuiz);
document.getElementById('retryBtn').addEventListener('click', retryQuiz);
</script>
