<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Quiz — Educación Vial</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0D0F14; --surface:#161A23; --surface2:#1E2330;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
    --accent:#F5C518; --accent2:#E8A900;
    --text:#F0F2F8; --muted:#7A8099;
    --green:#22C47A; --green-bg:rgba(34,196,122,0.12);
    --red:#FF5A5A; --red-bg:rgba(255,90,90,0.12);
    --amber:#F5A623; --amber-bg:rgba(245,166,35,0.12);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,24,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,24,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
  .glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(245,197,24,0.06) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0}
  .container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

  /* INTRO */
  #screen-intro{animation:fadeUp .5s ease both}
  .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:2rem}
  .breadcrumb-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .15s}
  .breadcrumb-link:hover{color:var(--text)}
  .breadcrumb-separator{color:var(--border);margin:0 4px}
  .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
  .logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-badge svg{width:20px;height:20px;color:#0D0F14}
  .logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .hero-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(245,197,24,.3);padding:4px 12px;border-radius:20px;margin-bottom:1.5rem}
  .hero-title{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,52px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem}
  .hero-title em{font-style:normal;color:var(--accent)}
  .hero-desc{font-size:16px;color:var(--muted);line-height:1.7;max-width:540px;margin-bottom:2.5rem}
  .stats-row{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2.5rem}
  .stat{flex:1;background:var(--surface);padding:1rem 1.25rem;text-align:center}
  .stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);display:block}
  .stat-lbl{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;display:block}
  .topics{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:2.5rem}
  .topic-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .topic-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .btn-start{display:inline-flex;align-items:center;gap:10px;background:var(--accent);color:#0D0F14;border:none;border-radius:10px;padding:14px 28px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:transform .15s,background .15s}
  .btn-start:hover{background:var(--accent2);transform:translateY(-2px)}
  .btn-start svg{width:18px;height:18px}

  /* QUIZ */
  #screen-quiz{display:none;animation:fadeUp .3s ease both}
  .quiz-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
  .progress-wrap{margin-bottom:1rem}
  .progress-info{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--muted)}
  .progress-info strong{color:var(--accent)}
  .progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
  .questions-container{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;margin-bottom:2rem}
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;animation:fadeUp .3s ease}
  .question-card.answered{border-color:var(--accent)}
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .q-num-badge{font-family:Syne;font-size:12px;color:var(--muted)}
  .section-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.2);padding:3px 10px;border-radius:20px}
  .q-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:1.5rem;line-height:1.4}
  .options{display:flex;flex-direction:column;gap:12px}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
  .opt:hover{border-color:var(--border2);background:rgba(245,197,24,.05)}
  .opt.selected{border-color:var(--accent);background:rgba(245,197,24,.08)}
  .opt-radio{width:18px;height:18px;min-width:18px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-top:2px}
  .opt.selected .opt-radio{border-color:var(--accent);background:var(--accent)}
  .opt.selected .opt-radio::after{content:'';width:6px;height:6px;background:#0D0F14;border-radius:50%}
  .opt-text{font-size:14px;line-height:1.5;color:var(--text)}
  .quiz-footer{max-width:760px;margin:2rem auto;text-align:right}
  .btn-nav{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .2s}
  .btn-nav:hover{background:var(--surface2);color:var(--text)}
  .btn-nav.primary{background:var(--accent);color:#0D0F14;border-color:var(--accent)}
  .btn-nav.primary:hover{background:var(--accent2)}
  .btn-nav svg{width:16px;height:16px}

  /* RESULT */
  #screen-result{display:none;animation:fadeUp .5s ease both}
  .result-hero{text-align:center;padding:3rem 0;margin-bottom:2rem}
  .score-ring{position:relative;width:180px;height:180px;margin:0 auto 2rem}
  .score-ring svg{width:180px;height:180px;transform:rotate(-90deg)}
  .score-ring .track{fill:none;stroke:var(--surface2);stroke-width:10}
  .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
  .score-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-num{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;line-height:1}
  .score-denom{font-size:13px;color:var(--muted);margin-top:4px}
  .result-label{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:8px}
  .result-pct{font-size:16px;color:var(--muted);margin-bottom:2rem}
  .result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .rs{background:var(--surface);padding:1.5rem;text-align:center}
  .rs-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;display:block;margin-bottom:0.5rem}
  .rs-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .result-quiz-layout{display:grid;grid-template-columns:280px 1fr;gap:2rem;margin-top:2rem}
  .review-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;height:fit-content;position:sticky;top:2rem;max-height:calc(100vh - 4rem);overflow-y:auto}
  .sidebar-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
  .review-list{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .review-number{width:100%;aspect-ratio:1;background:var(--surface2);border:2px solid transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
  .review-number.correct{background:rgba(34,196,122,.15);border-color:var(--green);color:var(--green)}
  .review-number.incorrect{background:rgba(255,90,90,.15);border-color:var(--red);color:var(--red)}
  .review-number:hover{transform:scale(1.05)}
  .review-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem}
  .review-item{margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
  .review-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
  .review-q{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:1rem}
  .review-answers{font-size:13px;line-height:1.8}
  .ans-label{color:var(--muted);display:block;margin-bottom:0.3rem}
  .ans-correct{color:var(--green);font-weight:600}
  .ans-wrong{color:var(--red);font-weight:600}
  .ans-exp{color:var(--muted);margin-top:0.8rem;font-size:12px;line-height:1.6;padding:.8rem;background:rgba(245,197,24,.05);border-left:2px solid var(--accent);border-radius:4px}
  .result-actions{display:flex;gap:12px;justify-content:center;margin-top:3rem}
  .breadcrumb-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;margin-bottom:2rem;transition:color .2s}
  .breadcrumb-back:hover{color:var(--text)}
  .breadcrumb-back svg{width:14px;height:14px}

  /* FEEDBACK INMEDIATO */
  .opt.correct{border-color:var(--green);background:var(--green-bg);cursor:default}
  .opt.correct .opt-radio{border-color:var(--green);background:var(--green)}
  .opt.correct .opt-radio::after{content:'✓';color:#0D0F14;font-size:10px;font-weight:700;width:auto;height:auto;background:none;border-radius:0}
  .opt.incorrect{border-color:var(--red);background:var(--red-bg);cursor:default}
  .opt.incorrect .opt-radio{border-color:var(--red)}
  .opt.disabled{cursor:default;pointer-events:none}
  .q-feedback{display:none;font-size:13px;color:var(--muted);line-height:1.6;margin-top:1rem;padding:.75rem 1rem;background:rgba(255,255,255,.03);border-left:2px solid var(--accent);border-radius:4px}
  .question-card.answered .q-feedback{display:block}

  /* MODO ESTUDIO */
  .btn-study{display:inline-flex;align-items:center;gap:10px;background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:14px 28px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .15s}
  .btn-study svg{width:18px;height:18px}
  .btn-study:hover{border-color:var(--green);color:var(--green);background:var(--green-bg);transform:translateY(-2px)}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap}
  #screen-quiz.study-mode .quiz-header,
  #screen-quiz.study-mode .quiz-footer{display:none}
  .study-banner{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--green);background:var(--green-bg);border:1px solid rgba(34,196,122,.2);border-radius:20px;padding:5px 14px;margin-bottom:1.5rem}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:1024px){
    .result-quiz-layout{grid-template-columns:1fr;gap:1.5rem}
    .review-sidebar{position:static;max-height:none;margin-bottom:1.5rem}
  }
  @media(max-width:600px){
    .container{padding:1.5rem 1rem 3rem}
    .review-list{grid-template-columns:repeat(3,1fr)}
    .question-card{padding:1.5rem}
    .quiz-footer{text-align:center}
    .btn-nav{width:100%;justify-content:center}
    .result-stats{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div id="screen-intro"></div>
  <div id="screen-quiz">
    <a class="breadcrumb-back" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al portal
    </a>
    <div class="quiz-header">
      <div class="progress-wrap">
        <div class="progress-info"><span>Respondidas</span><strong id="prog-count">0 / 0</strong></div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="questions-container" id="questions-container"></div>
    <div class="quiz-footer">
      <button class="btn-nav primary" id="btn-evaluate" onclick="evaluateQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Evaluar
      </button>
    </div>
  </div>
  <div id="screen-result"></div>
</div>

<script>
const QUIZ_CONFIG = {
  meta: {
    pageTitle:   "Quiz — Educación Vial",
    logoLabel:   "Educación Vial",
    heroTag:     "30 preguntas",
    heroTitle:   ["Repaso", "<em>Integral</em>"],
    description: "Evalúa tu conocimiento sobre educación vial: definiciones, vías, señales de tránsito, elementos viales y conceptos fundamentales.",
  },
  topics: [
    "Educación Vial y Tránsito",
    "Vías, Calzada y Carril",
    "Señales de Tránsito",
    "Elementos Viales y Luces",
    "Verdadero o Falso",
  ],
  grading: [
    { min: 90, label: "¡Excelente!",       color: "#F5C518" },
    { min: 70, label: "Buen trabajo",       color: "#22C47A" },
    { min: 50, label: "Aprobado",           color: "#F5A623" },
    { min:  0, label: "Necesitas mejorar", color: "#FF5A5A" },
  ],
  questions: [
    { section: "Educación Vial y Tránsito", q: "¿Qué es la educación vial?", opts: ["Conjunto de normas y conocimientos que capacita a la población para movilizarse de manera segura en las vías", "Ley que solo aplica a conductores de motor", "Sistema de señales y semáforos"], ans: 0, exp: "La educación vial aplica a conductores, peatones, pasajeros y ciclistas." },
    { section: "Educación Vial y Tránsito", q: "¿A quiénes capacita la educación vial?", opts: ["Solo a conductores profesionales", "Conductores, peatones, pasajeros y ciclistas", "Solo a conductores y agentes de tránsito"], ans: 1, exp: "La educación vial abarca a todos los usuarios del sistema vial." },
    { section: "Educación Vial y Tránsito", q: "¿Qué es el tránsito?", opts: ["Sistema de multas y sanciones", "Conjunto de señales verticales y horizontales", "Movimiento ordenado de personas, animales y vehículos dentro de las vías, regulado por leyes y reglamentos"], ans: 2, exp: "El tránsito incluye todo elemento que se moviliza por las vías públicas." },
    { section: "Educación Vial y Tránsito", q: "¿Qué es un agente de tránsito?", opts: ["Conductor con licencia profesional categoría C", "Servidor público especializado en el control y regulación del tránsito a nivel nacional", "Empleado municipal que recauda multas"], ans: 1, exp: "Existen agentes del EMOV, CTE y Policía Nacional." },
    { section: "Educación Vial y Tránsito", q: "¿En qué se diferencian los agentes del EMOV, la CTE y la Policía Nacional?", opts: ["En el nivel de formación académica", "En el tipo de vehículo que controlan", "En el ámbito de jurisdicción (zona donde operan)"], ans: 2, exp: "Todos cumplen la misma función general, pero operan en distintas zonas." },
    { section: "Vías, Calzada y Carril", q: "¿Cuál es la clasificación correcta de las vías?", opts: ["Vías urbanas, rurales, perimetrales y autopistas", "Vías principales, secundarias, terciarias y peatonales", "Autopistas, carreteras, avenidas y callejones"], ans: 0, exp: "Cuatro tipos según la LOTTTSV." },
    { section: "Vías, Calzada y Carril", q: "¿Para qué sirven las vías perimetrales?", opts: ["Conectar ciudades de distintas provincias", "Descongestionar el tráfico de la ciudad; están fuera del perímetro urbano", "Tránsito exclusivo de vehículos de carga pesada"], ans: 1, exp: "Están fuera del perímetro urbano y rodean la ciudad." },
    { section: "Vías, Calzada y Carril", q: "¿Qué es una calzada?", opts: ["Espacio destinado exclusivamente a peatones", "Espacio de la vía destinado exclusivamente a la circulación de vehículos", "Línea que divide los carriles en una autopista"], ans: 1, exp: "También pueden circular tranvías y vehículos de alta ocupación." },
    { section: "Vías, Calzada y Carril", q: "¿Qué es un carril?", opts: ["Espacio de la vía entre dos aceras", "Señal horizontal que indica límite de velocidad", "División de la calzada que delimita el espacio de cada vehículo"], ans: 2, exp: "Evita que los vehículos invadan el espacio de los demás." },
    { section: "Vías, Calzada y Carril", q: "¿Cuántos carriles puede tener una calzada como mínimo y máximo?", opts: ["Mínimo 2 y máximo 6; conteo en ambos sentidos", "Mínimo 1 y sin número máximo establecido; conteo en un solo sentido", "Mínimo 1 y máximo 8; conteo en ambos sentidos"], ans: 1, exp: "El conteo se realiza en un solo sentido de circulación." },
    { section: "Señales de Tránsito", q: "¿Qué es una señal de tránsito?", opts: ["Objeto, aviso, medio acústico, signo o leyenda colocada en las vías para regular el tránsito", "Únicamente las marcas pintadas sobre el asfalto", "Solo los semáforos en intersecciones"], ans: 0, exp: "Puede ser física, luminosa, acústica o manual." },
    { section: "Señales de Tránsito", q: "¿Cuál es la clasificación general de las señales de tránsito?", opts: ["Reglamentarias, preventivas, informativas y turísticas", "Verticales, horizontales, luminosas, acústicas y manuales", "Fijas, temporales, permanentes y móviles"], ans: 1, exp: "Cinco categorías según su tipo de emisión." },
    { section: "Señales de Tránsito", q: "¿Cómo se subdividen las señales horizontales?", opts: ["En reglamentarias, preventivas e informativas", "En verticales, luminosas y acústicas", "En longitudinales, transversales y marcas especiales"], ans: 2, exp: "Las marcas especiales incluyen límites de velocidad, la palabra BUS, reductores, etc." },
    { section: "Señales de Tránsito", q: "¿Qué colores pueden tener las señales horizontales longitudinales?", opts: ["Solo amarillo", "Amarillo o blanco", "Rojo o azul"], ans: 1, exp: "El color varía según la zona y el tipo de separación que indican." },
    { section: "Señales de Tránsito", q: "¿Qué son las señales reglamentarias?", opts: ["Señales que orientan sin obligación de cumplimiento", "Señales de carácter obligatorio: informan sobre limitaciones, restricciones, prohibiciones y obligaciones", "Señales que indican obras en la vía"], ans: 1, exp: "Su incumplimiento genera una sanción." },
    { section: "Señales de Tránsito", q: "¿Qué ocurre si no se respeta una señal reglamentaria?", opts: ["Nada, son meramente informativas", "Se genera una sanción", "Solo aplica a vehículos de carga pesada"], ans: 1, exp: "Son de cumplimiento obligatorio para todos los usuarios." },
    { section: "Señales de Tránsito", q: "¿Qué son las señales informativas?", opts: ["Señales de cumplimiento obligatorio que restringen el tránsito", "Señales que orientan y guían a los usuarios durante su trayectoria, sin ser de cumplimiento obligatorio", "Señales acústicas de emergencia"], ans: 1, exp: "Aplican a todos los usuarios del sistema vial, no solo conductores." },
    { section: "Señales de Tránsito", q: "¿De qué colores son las señales informativas?", opts: ["Rojo, negro y blanco", "Azul, verde, marrón y naranja", "Amarillo, gris y violeta"], ans: 1, exp: "El naranja indica específicamente obras en la vía." },
    { section: "Señales de Tránsito", q: "¿Qué indica una señal informativa de color naranja?", opts: ["Zona de peligro por animales", "Obras en la vía", "Zona de escuelas"], ans: 1, exp: "El naranja es el color asignado para zonas de trabajo en la vía." },
    { section: "Elementos Viales y Luces", q: "¿Cuáles son las formas básicas de estacionamiento?", opts: ["En fila, en grupo y en zona azul", "En batería, en paralelo y en diagonal", "Vertical, horizontal y oblicuo"], ans: 1, exp: "Tres formas según la orientación del vehículo respecto a la acera." },
    { section: "Elementos Viales y Luces", q: "¿Qué son los chevrones?", opts: ["Señales verticales de advertencia en curvas", "Líneas oblicuas pintadas sobre la calzada, al mismo nivel que esta", "Semáforos peatonales de alta visibilidad"], ans: 1, exp: "Pueden ser de color blanco o amarillo según la zona." },
    { section: "Elementos Viales y Luces", q: "¿En qué se diferencian los chevrones del parterre?", opts: ["Los chevrones son rojos y el parterre amarillo", "Los chevrones están al mismo nivel de la calzada; el parterre es una isla elevada", "Los chevrones están elevados; el parterre al nivel de la calzada"], ans: 1, exp: "El parterre tiene elevación física; los chevrones son pintados al ras." },
    { section: "Elementos Viales y Luces", q: "¿Cuáles son las funciones de los chevrones?", opts: ["Indicar zonas de estacionamiento y rutas de emergencia", "Dividir el sentido de circulación vehicular y servir de refugio para peatones", "Señalizar límites de velocidad en autopistas"], ans: 1, exp: "Son refugio para peatones que no logran cruzar completamente la vía." },
    { section: "Elementos Viales y Luces", q: "¿Qué es el pastel o parterre y a quién protege?", opts: ["Señal luminosa elevada que protege a conductores", "Isla elevada sobre el nivel de la calzada ubicada en medio de la vía; protege únicamente a los peatones", "Franja pintada que protege a ciclistas y conductores"], ans: 1, exp: "Al igual que la zona de seguridad peatonal, solo protege a peatones." },
    { section: "Elementos Viales y Luces", q: "¿A qué hora se deben encender las luces del vehículo obligatoriamente?", opts: ["A las 7:00 de la tarde", "A las 8:00 de la noche", "A las 6:00 de la tarde"], ans: 2, exp: "Obligatorio a partir de las 18h00." },
    { section: "Elementos Viales y Luces", q: "¿Para qué sirven las luces de posicionamiento o media luz?", opts: ["Iluminar la vía en niebla o lluvia intensa", "Indicar la posición del vehículo y determinar su ancho, largo y alto", "Señalizar que el vehículo está detenido en zona de emergencia"], ans: 1, exp: "Permiten que otros conductores identifiquen el tamaño del vehículo." },
    { section: "Verdadero o Falso", q: "Las señales horizontales longitudinales son SOLO de color amarillo. Esta afirmación es:", opts: ["Verdadera, solo se usan de color amarillo", "Falsa, también pueden ser de color blanco", "Verdadera, pero solo en zonas urbanas"], ans: 1, exp: "Pueden ser blancas o amarillas según la zona y el tipo de separación." },
    { section: "Verdadero o Falso", q: "Cruzar el semáforo en verde es un DEBER del conductor. Esta afirmación es:", opts: ["Verdadera, el conductor está obligado a avanzar en verde", "Falsa, es un DERECHO del conductor, no una obligación", "Verdadera, pero solo en vías de alta velocidad"], ans: 1, exp: "Un deber implica obligación; un derecho implica que puede ejercerlo o no." },
    { section: "Verdadero o Falso", q: "Es un deber del conductor hacer señales manuales a los peatones para que crucen. Esta afirmación es:", opts: ["Verdadera, debe facilitar el cruce con señales manuales", "Falsa, debe ceder el paso cuando el peatón está frente a la línea de seguridad, pero no tiene el deber de hacer señales manuales", "Verdadera, pero solo en zonas escolares"], ans: 1, exp: "El deber es ceder el paso, no hacer señales manuales." },
    { section: "Verdadero o Falso", q: "Poner atención a las indicaciones de los agentes de tránsito es un deber del conductor. Esta afirmación es:", opts: ["Falsa, son solo recomendaciones", "Falsa, solo aplica a conductores de servicio público", "Verdadera, es un deber del conductor"], ans: 2, exp: "Los agentes de tránsito tienen autoridad sobre el tránsito en su zona." },
  ]
};

let answers = {};
let quizMode = null;

function initQuiz() {
  document.title = QUIZ_CONFIG.meta.pageTitle;
  renderIntro();
}

function renderIntro() {
  const intro = document.getElementById('screen-intro');
  const { meta, topics, questions } = QUIZ_CONFIG;

  intro.innerHTML = `
    <div class="breadcrumb">
      <a class="breadcrumb-link" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Portal
      </a>
      <span class="breadcrumb-separator">/</span>
      <span style="font-size:12px;color:var(--text)">${meta.logoLabel}</span>
    </div>
    <div class="logo-row">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/></svg>
      </div>
      <div class="logo-text">${meta.logoLabel}</div>
    </div>
    <div class="hero-tag">${meta.heroTag}</div>
    <h1 class="hero-title">${meta.heroTitle.join(' ')}</h1>
    <p class="hero-desc">${meta.description}</p>
    <div class="stats-row">
      <div class="stat"><span class="stat-num">${questions.length}</span><span class="stat-lbl">Preguntas</span></div>
      <div class="stat"><span class="stat-num">${topics.length}</span><span class="stat-lbl">Temas</span></div>
    </div>
    <div class="topics">${topics.map(t => `<div class="topic-chip"><div class="topic-dot"></div>${t}</div>`).join('')}</div>
    <div class="btn-row">
      <button class="btn-study" onclick="startStudyMode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Estudiar
      </button>
      <button class="btn-start" onclick="startQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Realizar prueba
      </button>
    </div>
  `;
}

function startQuiz() {
  quizMode = 'test';
  answers = {};
  document.getElementById('screen-intro').style.display = 'none';
  const quizScreen = document.getElementById('screen-quiz');
  quizScreen.classList.remove('study-mode');
  quizScreen.style.display = 'block';
  renderAllQuestions();
  updateProgress();
  window.scrollTo(0, 0);
}

function startStudyMode() {
  quizMode = 'study';
  answers = {};
  document.getElementById('screen-intro').style.display = 'none';
  const quizScreen = document.getElementById('screen-quiz');
  quizScreen.classList.add('study-mode');
  quizScreen.style.display = 'block';
  renderStudyMode();
  window.scrollTo(0, 0);
}

function renderStudyMode() {
  const container = document.getElementById('questions-container');
  container.innerHTML =
    '<div class="study-banner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Modo Estudio</div>' +
    QUIZ_CONFIG.questions.map((q, i) => {
      const optsHTML = q.opts.map((opt, j) => {
        let cls = 'opt disabled';
        if (j === q.ans) cls += ' correct';
        return `<div class="${cls}"><div class="opt-radio"></div><div class="opt-text">${opt}</div></div>`;
      }).join('');
      return `
        <div class="question-card answered" id="qcard-${i}">
          <div class="q-meta">
            <span class="q-num-badge">P${i + 1}</span>
            <div class="section-tag">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              ${q.section}
            </div>
          </div>
          <h2 class="q-title">${q.q}</h2>
          <div class="options">${optsHTML}</div>
          <div class="q-feedback">${q.exp}</div>
        </div>`;
    }).join('');
}

function renderAllQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = QUIZ_CONFIG.questions.map((q, i) => {
    const answered = answers[i] !== undefined;
    const userChoice = answers[i];
    const optsHTML = q.opts.map((opt, j) => {
      let cls = 'opt';
      if (answered) {
        cls += ' disabled';
        if (j === q.ans) cls += ' correct';
        else if (j === userChoice) cls += ' incorrect';
      }
      return `<div class="${cls}" onclick="answerQuestion(${i}, ${j})"><div class="opt-radio"></div><div class="opt-text">${opt}</div></div>`;
    }).join('');
    return `
      <div class="question-card ${answered ? 'answered' : ''}" id="qcard-${i}">
        <div class="q-meta">
          <span class="q-num-badge">P${i + 1}</span>
          <div class="section-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            ${q.section}
          </div>
        </div>
        <h2 class="q-title">${q.q}</h2>
        <div class="options">${optsHTML}</div>
        <div class="q-feedback">${q.exp}</div>
      </div>`;
  }).join('');
}

function answerQuestion(qIdx, optIdx) {
  if (answers[qIdx] !== undefined) return;
  answers[qIdx] = optIdx;
  const q = QUIZ_CONFIG.questions[qIdx];
  const card = document.getElementById('qcard-' + qIdx);
  card.classList.add('answered');
  card.querySelectorAll('.opt').forEach((el, j) => {
    el.classList.add('disabled');
    if (j === q.ans) el.classList.add('correct');
    else if (j === optIdx) el.classList.add('incorrect');
  });
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = QUIZ_CONFIG.questions.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('prog-count').textContent = `${answered} / ${total}`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function evaluateQuiz() {
  if (Object.keys(answers).length < QUIZ_CONFIG.questions.length) {
    alert('Por favor responde todas las preguntas antes de evaluar.');
    return;
  }
  renderResult();
}

function renderResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  const result = document.getElementById('screen-result');
  result.style.display = 'block';

  let correctCount = 0;
  QUIZ_CONFIG.questions.forEach((q, i) => {
    if (answers[i] === q.ans) correctCount++;
  });

  const total = QUIZ_CONFIG.questions.length;
  const pct = Math.round((correctCount / total) * 100);
  const gradeObj = QUIZ_CONFIG.grading.find(g => pct >= g.min);
  const circumference = 2 * Math.PI * 85;
  const strokeDashoffset = circumference - (pct / 100) * circumference;

  let reviewHTML = '';
  QUIZ_CONFIG.questions.forEach((q, i) => {
    const isCorrect = answers[i] === q.ans;
    const userAns = q.opts[answers[i]];
    const correctAns = q.opts[q.ans];
    reviewHTML += `
      <div class="review-item">
        <div class="review-q">P${i + 1}: ${q.q}</div>
        <div class="review-answers">
          <span class="ans-label">Tu respuesta:</span>
          <div class="${isCorrect ? 'ans-correct' : 'ans-wrong'}">${userAns || '(no respondida)'}</div>
          ${!isCorrect ? `<span class="ans-label" style="margin-top:.5rem;display:block">Respuesta correcta:</span><div class="ans-correct">${correctAns}</div>` : ''}
          <div class="ans-exp">${q.exp}</div>
        </div>
      </div>`;
  });

  result.innerHTML = `
    <a class="breadcrumb-back" href="../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al portal
    </a>
    <div class="result-hero">
      <div class="score-ring">
        <svg viewBox="0 0 180 180">
          <circle class="track" cx="90" cy="90" r="85"/>
          <circle class="ring-fill" cx="90" cy="90" r="85" stroke="${gradeObj.color}" style="stroke-dasharray:${circumference};stroke-dashoffset:${strokeDashoffset}"/>
        </svg>
        <div class="score-inner">
          <div class="score-num">${correctCount}</div>
          <div class="score-denom">/ ${total}</div>
        </div>
      </div>
      <div class="result-label" style="color:${gradeObj.color}">${gradeObj.label}</div>
      <div class="result-pct">${pct}% correcto</div>
    </div>
    <div class="result-stats">
      <div class="rs"><span class="rs-num" style="color:var(--green)">${correctCount}</span><span class="rs-lbl">Correctas</span></div>
      <div class="rs"><span class="rs-num" style="color:var(--red)">${total - correctCount}</span><span class="rs-lbl">Incorrectas</span></div>
      <div class="rs"><span class="rs-num">${pct}%</span><span class="rs-lbl">Porcentaje</span></div>
    </div>
    <div class="result-quiz-layout">
      <div class="review-sidebar">
        <div class="sidebar-title">Resultados</div>
        <div class="review-list">
          ${QUIZ_CONFIG.questions.map((q, i) => {
            const isCorrect = answers[i] === q.ans;
            return `<div class="review-number ${isCorrect ? 'correct' : 'incorrect'}" onclick="scrollToReview(${i})">${i + 1}</div>`;
          }).join('')}
        </div>
      </div>
      <div class="review-content" id="review-content">${reviewHTML}</div>
    </div>
    <div class="result-actions">
      <button class="btn-nav" onclick="retryQuiz()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/></svg>
        Reintentar
      </button>
      <button class="btn-nav primary" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Volver al portal
      </button>
    </div>
  `;
  window.scrollTo(0, 0);
}

function scrollToReview(idx) {
  const reviewContent = document.getElementById('review-content');
  if (reviewContent) {
    reviewContent.children[idx].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function retryQuiz() {
  answers = {};
  document.getElementById('screen-result').style.display = 'none';
  const quizScreen = document.getElementById('screen-quiz');
  quizScreen.classList.remove('study-mode');
  quizScreen.style.display = 'block';
  renderAllQuestions();
  updateProgress();
  window.scrollTo(0, 0);
}

function goHome() {
  window.location.href = '../index.html';
}

initQuiz();
</script>
</body>
</html>
