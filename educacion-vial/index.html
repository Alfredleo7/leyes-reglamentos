<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Educación Vial</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0D0F14; --surface:#161A23; --surface2:#1E2330;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
      --accent:#F5C518; --accent2:#E8A900;
      --text:#F0F2F8; --muted:#7A8099;
      --green:#22C47A; --red:#FF5A5A;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,24,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,24,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
    .glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(245,197,24,0.06) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0}

    .container{max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}

    /* HEADER */
    .header{margin-bottom:3rem;display:flex;align-items:center;justify-content:space-between}
    .breadcrumb{display:flex;align-items:center;gap:8px}
    .breadcrumb-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer;transition:color .15s}
    .breadcrumb-link:hover{color:var(--text)}
    .breadcrumb-separator{color:var(--border);margin:0 4px}

    .progress-bar{width:200px;height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s ease}

    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
    .logo-badge{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
    .logo-badge svg{width:20px;height:20px;color:#0D0F14}
    .logo-text{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

    .hero-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(245,197,24,.3);padding:4px 12px;border-radius:20px;margin-bottom:1.5rem}
    .hero-title{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,48px);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin-bottom:1rem}
    .hero-title em{font-style:normal;color:var(--accent)}
    .hero-desc{font-size:16px;color:var(--muted);line-height:1.7;max-width:540px;margin-bottom:2rem}

    /* QUIZ CONTAINER */
    .quiz-state-initial,
    .quiz-state-answering,
    .quiz-state-result { display:none }
    .quiz-state-initial.active,
    .quiz-state-answering.active,
    .quiz-state-result.active { display:block }

    .questions-container{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem;margin-bottom:3rem}

    .question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;transition:all .2s}
    .question-card.answered{border-color:var(--accent)}
    .question-card:hover:not(.answered){border-color:rgba(245,197,24,.3)}

    .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:1rem;font-size:12px;color:var(--muted)}
    .q-num-badge{font-family:'Syne';font-weight:700;color:var(--accent)}
    .q-topic{font-size:11px;letter-spacing:.08em;text-transform:uppercase}

    .q-text{font-size:15px;font-weight:500;line-height:1.6;margin-bottom:1.5rem;color:var(--text)}

    .q-options{display:flex;flex-direction:column;gap:10px}
    .q-option{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s}
    .q-option:hover{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.2)}
    .q-option.selected{background:var(--accent);border-color:var(--accent);color:#0D0F14}
    .q-option.correct{background:rgba(34,196,122,.15);border-color:var(--green)}
    .q-option.incorrect{background:rgba(255,90,90,.15);border-color:var(--red)}

    .q-option-radio{width:18px;height:18px;border:2px solid var(--muted);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .q-option.selected .q-option-radio{border-color:var(--text);background:#0D0F14}
    .q-option.selected .q-option-radio::after{content:'';width:6px;height:6px;background:#0D0F14;border-radius:50%}
    .q-option.correct .q-option-radio{border-color:var(--green);background:var(--green)}
    .q-option.correct .q-option-radio::after{content:'✓';color:#0D0F14;font-size:10px;font-weight:700}
    .q-option.incorrect .q-option-radio{border-color:var(--red)}

    .q-explanation{font-size:13px;color:var(--muted);line-height:1.6;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:none}
    .question-card.answered .q-explanation{display:block}

    .quiz-footer{max-width:760px;margin:0 auto;text-align:right}
    .quiz-footer button{background:var(--accent);color:#0D0F14;border:none;border-radius:10px;padding:12px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}
    .quiz-footer button:hover{background:var(--accent2);transform:translateX(2px)}

    .result-container{max-width:760px;margin:0 auto;text-align:center}
    .result-score{font-family:'Syne';font-size:clamp(48px,10vw,72px);font-weight:800;margin-bottom:1rem}
    .result-score.excellent{color:var(--accent)}
    .result-score.good{color:var(--green)}
    .result-score.fair{color:var(--text)}
    .result-score.poor{color:var(--red)}

    .result-ring-container{width:240px;height:240px;margin:0 auto 2rem;position:relative}
    .result-ring{width:100%;height:100%;border-radius:50%}
    .result-ring-bg{position:absolute;inset:0;border-radius:50%;border:12px solid var(--surface2)}
    .result-ring-stroke{position:absolute;inset:0;border-radius:50%;border:12px solid var(--accent);border-bottom-color:transparent;border-left-color:transparent;stroke-dasharray:150 628;stroke-dashoffset:0;animation:fillRing 1.2s ease-out forwards}
    @keyframes fillRing{from{stroke-dashoffset:628}to{stroke-dashoffset:0}}

    .result-message{font-size:18px;font-weight:600;color:var(--text);margin-bottom:1rem}
    .result-details{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:2rem}
    .result-stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem;font-size:13px}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem}
    .stat-label{color:var(--muted);margin-bottom:.5rem}
    .stat-value{font-family:'Syne';font-size:24px;font-weight:700;color:var(--accent)}

    @media(max-width:768px){
      .header{flex-direction:column;align-items:flex-start;gap:1rem}
      .progress-bar{width:100%}
      .result-stats{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="header">
    <div class="breadcrumb">
      <a class="breadcrumb-link" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Volver
      </a>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="logo-row">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/></svg>
    </div>
    <div class="logo-text">Educación Vial</div>
  </div>

  <div class="hero-tag">30 preguntas</div>
  <h1 class="hero-title">Repaso <em>Integral</em></h1>
  <p class="hero-desc">Evalúa tu conocimiento de todas las unidades: definiciones, vías, señales, elementos viales y conceptos fundamentales. Un examen completo de educación vial.</p>

  <div class="quiz-state-initial active">
    <button class="unit-button" style="display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#0D0F14;border:none;border-radius:10px;padding:12px 24px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;text-decoration:none;transition:all .2s" id="startBtn">
      Comenzar Quiz
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="quiz-state-answering">
    <div class="questions-container" id="questionsContainer"></div>
    <div class="quiz-footer">
      <button id="submitBtn">Enviar Respuestas</button>
    </div>
  </div>

  <div class="quiz-state-result">
    <div class="result-container">
      <div class="result-ring-container">
        <div class="result-ring-bg"></div>
        <svg class="result-ring" viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="12" stroke-dasharray="150 628"/></svg>
      </div>
      <div class="result-score" id="resultScore">0%</div>
      <div class="result-message" id="resultMessage">Resultado</div>
      <div class="result-details" id="resultDetails">Detalles del resultado</div>
      <div class="result-stats">
        <div class="stat">
          <div class="stat-label">Respuestas correctas</div>
          <div class="stat-value" id="correctCount">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Respuestas incorrectas</div>
          <div class="stat-value" id="incorrectCount">0</div>
        </div>
      </div>
      <button id="retryBtn">Intentar de nuevo</button>
    </div>
  </div>
</div>

<script>
const QUIZ_CONFIG = {
  meta: {
    pageTitle: "Quiz — Educación Vial",
    logoLabel: "Educación Vial",
    heroTag: "30 preguntas",
    heroTitle: "Repaso Integral",
    description: "Evalúa tu conocimiento de todas las unidades de educación vial."
  },
  topics: ["Educación Vial y Tránsito", "Vías, Calzada y Carril", "Señales de Tránsito", "Elementos Viales y Luces", "Verdadero o Falso"],
  questions: [
    {
      text: "¿Qué es la educación vial?",
      options: [
        "Conjunto de normas y conocimientos que capacita a la población para movilizarse de manera segura en las vías",
        "Ley que solo aplica a conductores de motor",
        "Sistema de señales y semáforos"
      ],
      correct: 0,
      explanation: "La educación vial aplica a conductores, peatones, pasajeros y ciclistas.",
      topic: "Educación Vial y Tránsito"
    },
    {
      text: "¿A quiénes capacita la educación vial?",
      options: [
        "Solo a conductores profesionales",
        "Conductores, peatones, pasajeros y ciclistas",
        "Solo a conductores y agentes de tránsito"
      ],
      correct: 1,
      explanation: "La educación vial abarca a todos los usuarios del sistema vial.",
      topic: "Educación Vial y Tránsito"
    },
    {
      text: "¿Qué es el tránsito?",
      options: [
        "Sistema de multas y sanciones",
        "Conjunto de señales verticales y horizontales",
        "Movimiento ordenado de personas, animales y vehículos dentro de las vías, regulado por leyes y reglamentos"
      ],
      correct: 2,
      explanation: "El tránsito incluye todo elemento que se moviliza por las vías públicas.",
      topic: "Educación Vial y Tránsito"
    },
    {
      text: "¿Qué es un agente de tránsito?",
      options: [
        "Conductor con licencia profesional categoría C",
        "Servidor público especializado en el control y regulación del tránsito a nivel nacional",
        "Empleado municipal que recauda multas"
      ],
      correct: 1,
      explanation: "Existen agentes del EMOV, CTE y Policía Nacional.",
      topic: "Educación Vial y Tránsito"
    },
    {
      text: "¿En qué se diferencian los agentes del EMOV, la CTE y la Policía Nacional?",
      options: [
        "En el nivel de formación académica",
        "En el tipo de vehículo que controlan",
        "En el ámbito de jurisdicción (zona donde operan)"
      ],
      correct: 2,
      explanation: "Todos cumplen la misma función general, pero operan en distintas zonas.",
      topic: "Educación Vial y Tránsito"
    },
    {
      text: "¿Cuál es la clasificación correcta de las vías?",
      options: [
        "Vías urbanas, rurales, perimetrales y autopistas",
        "Vías principales, secundarias, terciarias y peatonales",
        "Autopistas, carreteras, avenidas y callejones"
      ],
      correct: 0,
      explanation: "Cuatro tipos según la LOTTTSV.",
      topic: "Vías, Calzada y Carril"
    },
    {
      text: "¿Para qué sirven las vías perimetrales?",
      options: [
        "Conectar ciudades de distintas provincias",
        "Descongestionar el tráfico de la ciudad; están fuera del perímetro urbano",
        "Tránsito exclusivo de vehículos de carga pesada"
      ],
      correct: 1,
      explanation: "Están fuera del perímetro urbano y rodean la ciudad.",
      topic: "Vías, Calzada y Carril"
    },
    {
      text: "¿Qué es una calzada?",
      options: [
        "Espacio destinado exclusivamente a peatones",
        "Espacio de la vía destinado exclusivamente a la circulación de vehículos",
        "Línea que divide los carriles en una autopista"
      ],
      correct: 1,
      explanation: "También pueden circular tranvías y vehículos de alta ocupación.",
      topic: "Vías, Calzada y Carril"
    },
    {
      text: "¿Qué es un carril?",
      options: [
        "Espacio de la vía entre dos aceras",
        "Señal horizontal que indica límite de velocidad",
        "División de la calzada que delimita el espacio de cada vehículo"
      ],
      correct: 2,
      explanation: "Evita que los vehículos invadan el espacio de los demás.",
      topic: "Vías, Calzada y Carril"
    },
    {
      text: "¿Cuántos carriles puede tener una calzada como mínimo y máximo?",
      options: [
        "Mínimo 2 y máximo 6; conteo en ambos sentidos",
        "Mínimo 1 y sin número máximo establecido; conteo en un solo sentido",
        "Mínimo 1 y máximo 8; conteo en ambos sentidos"
      ],
      correct: 1,
      explanation: "El conteo se realiza en un solo sentido de circulación.",
      topic: "Vías, Calzada y Carril"
    },
    {
      text: "¿Qué es una señal de tránsito?",
      options: [
        "Objeto, aviso, medio acústico, signo o leyenda colocada en las vías para regular el tránsito",
        "Únicamente las marcas pintadas sobre el asfalto",
        "Solo los semáforos en intersecciones"
      ],
      correct: 0,
      explanation: "Puede ser física, luminosa, acústica o manual.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Cuál es la clasificación general de las señales de tránsito?",
      options: [
        "Reglamentarias, preventivas, informativas y turísticas",
        "Verticales, horizontales, luminosas, acústicas y manuales",
        "Fijas, temporales, permanentes y móviles"
      ],
      correct: 1,
      explanation: "Cinco categorías según su tipo de emisión.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Cómo se subdividen las señales horizontales?",
      options: [
        "En reglamentarias, preventivas e informativas",
        "En verticales, luminosas y acústicas",
        "En longitudinales, transversales y marcas especiales"
      ],
      correct: 2,
      explanation: "Las marcas especiales incluyen límites de velocidad, la palabra BUS, reductores, etc.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Qué colores pueden tener las señales horizontales longitudinales?",
      options: [
        "Solo amarillo",
        "Amarillo o blanco",
        "Rojo o azul"
      ],
      correct: 1,
      explanation: "El color varía según la zona y el tipo de separación que indican.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Qué son las señales reglamentarias?",
      options: [
        "Señales que orientan sin obligación de cumplimiento",
        "Señales de carácter obligatorio: informan sobre limitaciones, restricciones, prohibiciones y obligaciones",
        "Señales que indican obras en la vía"
      ],
      correct: 1,
      explanation: "Su incumplimiento genera una sanción.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Qué ocurre si no se respeta una señal reglamentaria?",
      options: [
        "Nada, son meramente informativas",
        "Se genera una sanción",
        "Solo aplica a vehículos de carga pesada"
      ],
      correct: 1,
      explanation: "Son de cumplimiento obligatorio para todos los usuarios.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Qué son las señales informativas?",
      options: [
        "Señales de cumplimiento obligatorio que restringen el tránsito",
        "Señales que orientan y guían a los usuarios durante su trayectoria, sin ser de cumplimiento obligatorio",
        "Señales acústicas de emergencia"
      ],
      correct: 1,
      explanation: "Aplican a todos los usuarios del sistema vial, no solo conductores.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿De qué colores son las señales informativas?",
      options: [
        "Rojo, negro y blanco",
        "Azul, verde, marrón y naranja",
        "Amarillo, gris y violeta"
      ],
      correct: 1,
      explanation: "El naranja indica específicamente obras en la vía.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Qué indica una señal informativa de color naranja?",
      options: [
        "Zona de peligro por animales",
        "Obras en la vía",
        "Zona de escuelas"
      ],
      correct: 1,
      explanation: "El naranja es el color asignado para zonas de trabajo en la vía.",
      topic: "Señales de Tránsito"
    },
    {
      text: "¿Cuáles son las formas básicas de estacionamiento?",
      options: [
        "En fila, en grupo y en zona azul",
        "En batería, en paralelo y en diagonal",
        "Vertical, horizontal y oblicuo"
      ],
      correct: 1,
      explanation: "Tres formas según la orientación del vehículo respecto a la acera.",
      topic: "Elementos Viales y Luces"
    },
    {
      text: "¿Qué son los chevrones?",
      options: [
        "Señales verticales de advertencia en curvas",
        "Líneas oblicuas pintadas sobre la calzada, al mismo nivel que esta",
        "Semáforos peatonales de alta visibilidad"
      ],
      correct: 1,
      explanation: "Pueden ser de color blanco o amarillo según la zona.",
      topic: "Elementos Viales y Luces"
    },
    {
      text: "¿En qué se diferencian los chevrones del parterre?",
      options: [
        "Los chevrones son rojos y el parterre amarillo",
        "Los chevrones están al mismo nivel de la calzada; el parterre es una isla elevada",
        "Los chevrones están elevados; el parterre al nivel de la calzada"
      ],
      correct: 1,
      explanation: "El parterre tiene elevación física; los chevrones son pintados al ras.",
      topic: "Elementos Viales y Luces"
    },
    {
      text: "¿Cuáles son las funciones de los chevrones?",
      options: [
        "Indicar zonas de estacionamiento y rutas de emergencia",
        "Dividir el sentido de circulación vehicular y servir de refugio para peatones",
        "Señalizar límites de velocidad en autopistas"
      ],
      correct: 1,
      explanation: "Son refugio para peatones que no logran cruzar completamente la vía.",
      topic: "Elementos Viales y Luces"
    },
    {
      text: "¿Qué es el pastel o parterre y a quién protege?",
      options: [
        "Señal luminosa elevada que protege a conductores",
        "Isla elevada sobre el nivel de la calzada ubicada en medio de la vía; protege únicamente a los peatones",

      ],
      correct: 1,
      explanation: "Al igual que la zona de seguridad peatonal, solo protege a peatones.",
      topic: "Elementos Viales y Luces"
    },
    {
      text: "¿A qué hora se deben encender las luces del vehículo obligatoriamente?",

        "A las 7:00 de la tarde",
        "A las 8:00 de la noche",
        "A las 6:00 de la tarde"
      ],
      correct: 2,
      explanation: "Obligatorio a partir de las 18h00.",
      topic: "Elementos Viales y Luces"
    },
    {
      text: "¿Para qué sirven las luces de posicionamiento o media luz?",
      options: [
        "Iluminar la vía en niebla o lluvia intensa",
        "Indicar la posición del vehículo y determinar su ancho, largo y alto",
        "Señalizar que el vehículo está detenido en zona de emergencia"
      ],
      correct: 1,
      explanation: "Permiten que otros conductores identifiquen el tamaño del vehículo.",
      topic: "Elementos Viales y Luces"
    },
    {
      text: "Las señales horizontales longitudinales son SOLO de color amarillo. Esta afirmación es:",
      options: [
        "Verdadera, solo se usan de color amarillo",
        "Falsa, también pueden ser de color blanco",
        "Verdadera, pero solo en zonas urbanas"
      ],
      correct: 1,
      explanation: "Pueden ser blancas o amarillas según la zona y el tipo de separación.",
      topic: "Verdadero o Falso"
    },
    {
      text: "Cruzar el semáforo en verde es un DEBER del conductor. Esta afirmación es:",
      options: [
        "Verdadera, el conductor está obligado a avanzar en verde",
        "Falsa, es un DERECHO del conductor, no una obligación",
        "Verdadera, pero solo en vías de alta velocidad"
      ],
      correct: 1,
      explanation: "Un deber implica obligación; un derecho implica que puede ejercerlo o no.",
      topic: "Verdadero o Falso"
    },
    {
      text: "Es un deber del conductor hacer señales manuales a los peatones para que crucen. Esta afirmación es:",
      options: [
        "Verdadera, debe facilitar el cruce con señales manuales",
        "Falsa, debe ceder el paso cuando el peatón está frente a la línea de seguridad, pero no tiene el deber de hacer señales manuales",
        "Verdadera, pero solo en zonas escolares"
      ],
      correct: 1,
      explanation: "El deber es ceder el paso, no hacer señales manuales.",
      topic: "Verdadero o Falso"
    },
    {
      text: "Poner atención a las indicaciones de los agentes de tránsito es un deber del conductor. Esta afirmación es:",
      options: [
        "Falsa, son solo recomendaciones",
        "Falsa, solo aplica a conductores de servicio público",
        "Verdadera, es un deber del conductor"
      ],
      correct: 2,
      explanation: "Los agentes de tránsito tienen autoridad sobre el tránsito en su zona.",
      topic: "Verdadero o Falso"
    }
  ]
};

let answers = {};
const states = {
  initial: document.querySelector('.quiz-state-initial'),
  answering: document.querySelector('.quiz-state-answering'),
  result: document.querySelector('.quiz-state-result')
};

function showState(stateName) {
  Object.values(states).forEach(s => s.classList.remove('active'));
  states[stateName].classList.add('active');
}

function startQuiz() {
  answers = {};
  showState('answering');
  renderAllQuestions();
  window.scrollTo(0, 0);
}

function renderAllQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  QUIZ_CONFIG.questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';

    const meta = document.createElement('div');
    meta.className = 'q-meta';
    meta.innerHTML = `
      <span class="q-num-badge">Pregunta ${idx + 1}</span>
      <span class="q-topic">${q.topic}</span>
    `;

    const text = document.createElement('div');
    text.className = 'q-text';
    text.textContent = q.text;

    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'q-options';

    q.options.forEach((opt, optIdx) => {
      const option = document.createElement('div');
      option.className = 'q-option';
      if (answers[idx] === optIdx) option.classList.add('selected');

      option.innerHTML = `
        <div class="q-option-radio"></div>
        <span>${opt}</span>
      `;

      option.addEventListener('click', () => answerQuestion(idx, optIdx));
      optionsDiv.appendChild(option);
    });

    const explanation = document.createElement('div');
    explanation.className = 'q-explanation';
    explanation.textContent = q.explanation;

    card.appendChild(meta);
    card.appendChild(text);
    card.appendChild(optionsDiv);
    card.appendChild(explanation);
    container.appendChild(card);
  });

  updateProgress();
}

function answerQuestion(qIdx, optIdx) {
  answers[qIdx] = optIdx;
  const cards = document.querySelectorAll('.question-card');
  const card = cards[qIdx];
  card.classList.add('answered');

  const options = card.querySelectorAll('.q-option');
  const correct = QUIZ_CONFIG.questions[qIdx].correct;

  options.forEach((opt, idx) => {
    opt.classList.remove('selected');
    if (idx === optIdx) {
      if (idx === correct) {
        opt.classList.add('correct');
      } else {
        opt.classList.add('incorrect');
      }
    }
    if (idx === correct && idx !== optIdx) {
      opt.classList.add('correct');
    }
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const total = QUIZ_CONFIG.questions.length;
  const percentage = (answered / total) * 100;
  document.querySelector('.progress-fill').style.width = percentage + '%';
}

function submitQuiz() {
  const unanswered = QUIZ_CONFIG.questions.length - Object.keys(answers).length;
  if (unanswered > 0) {
    alert(`Por favor responde todas las preguntas. Te faltan ${unanswered}.`);
    return;
  }
  evaluateQuiz();
}

function evaluateQuiz() {
  let correct = 0;
  QUIZ_CONFIG.questions.forEach((q, idx) => {
    if (answers[idx] === q.correct) correct++;
  });

  const percentage = Math.round((correct / QUIZ_CONFIG.questions.length) * 100);
  const total = QUIZ_CONFIG.questions.length;

  document.getElementById('resultScore').textContent = percentage + '%';
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('incorrectCount').textContent = total - correct;

  let message, details, scoreClass;
  if (percentage >= 90) {
    message = '¡Excelente!';
    details = 'Has dominado los conocimientos fundamentales de educación vial. Felicidades por tu desempeño excepcional.';
    scoreClass = 'excellent';
  } else if (percentage >= 70) {
    message = 'Buen trabajo';
    details = 'Tienes un buen conocimiento integral de educación vial. Sigue practicando para mejorar aún más.';
    scoreClass = 'good';
  } else if (percentage >= 50) {
    message = 'Satisfecho';
    details = 'Has alcanzado una calificación media en esta evaluación. Repasa los temas principales para fortalecer tus conocimientos.';
    scoreClass = 'fair';
  } else {
    message = 'Necesitas mejorar';
    details = 'Tu calificación está por debajo del promedio. Te recomendamos repasar todo el contenido de educación vial.';
    scoreClass = 'poor';
  }

  document.getElementById('resultMessage').textContent = message;
  document.getElementById('resultDetails').textContent = details;
  document.getElementById('resultScore').className = 'result-score ' + scoreClass;

  showState('result');
  window.scrollTo(0, 0);
}

function retryQuiz() {
  startQuiz();
}

document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('submitBtn').addEventListener('click', submitQuiz);
document.getElementById('retryBtn').addEventListener('click', retryQuiz);
</script>
