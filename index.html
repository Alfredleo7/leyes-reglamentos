<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sindicato de Choferes - Cuestionarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        p {
            color: #64748b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .card h2 {
            font-size: 1.25rem;
            margin: 0;
            text-align: center;
        }

        .btn {
            margin-top: 1.5rem;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Plataforma de Estudio</h1>
        <p>Selecciona el módulo que deseas revisar hoy</p>
    </header>

    <div class="grid">
        <a href="teoria-conduccion/index.html" class="card">
            <div class="icon">🚗</div>
            <h2>Teoría de la Conducción</h2>
            <div class="btn">Abrir Módulo</div>
        </a>

        <a href="computacion/index.html" class="card">
            <div class="icon">💻</div>
            <h2>Computación</h2>
            <div class="btn">Abrir Módulo</div>
        </a>

        <a href="mecanica-basica/index.html" class="card">
            <div class="icon">🔧</div>
            <h2>Mecánica Básica</h2>
            <div class="btn">Abrir Módulo</div>
        </a>

        <a href="leyes-reglamentos/index.html" class="card">
            <div class="icon">⚖️</div>
            <h2>Leyes y Reglamentos</h2>
            <div class="btn">Abrir Módulo</div>
        </a>
    </div>

</body>
</html>
